name: Screenshot
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: true
    
    - uses: microsoft/playwright-github-action@v1
    
    - name: Generate Screenshots
      run: |
        npx playwright test --project=chromium -c playwright.config.js << 'EOF'
        module.exports = {
          timeout: 60000,
          use: {
            headless: true,
            viewport: { width: 1920, height: 1080 },
          },
          projects: [{
            name: 'chromium',
            use: { ...devices['Desktop Chrome'] },
          }]
        };
        EOF
        
        mkdir -p tests
        cat > tests/screenshot.spec.js << 'EOF'
        const { test, expect } = require('@playwright/test');
        
        test('screenshot', async ({ page }) => {
          await page.goto('https://chatgpt.com');
          await expect(page).toHaveTitle(/ChatGPT/);
          await page.screenshot({ path: 'screenshot-chromium.png', fullPage: true });
        });
        EOF
        
        npx playwright test tests/screenshot.spec.js
    
    - name: List files
      run: ls -la *.png
    
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "📸 Update screenshots [skip ci]"
        file_pattern: '*.png'
