name: NO NPM Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Chrome + Node + Click
      run: |
        # Node
        curl -fsSL https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.xz | tar -xJ
        export PATH="$PWD/node-v20.11.1-linux-x64/bin:$PATH"
        
        # Puppeteer بدون npm
        npm install puppeteer-core
        
        # Chrome
        sudo apt-get update -qq
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update -qq
        sudo apt-get install -y google-chrome-stable -qq
        
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer-core');
        (async () => {
          const browser = await puppeteer.launch({
            headless: true,
            executablePath: '/usr/bin/google-chrome-stable',
            args: ['--no-sandbox']
          });
          const page = await browser.newPage();
          await page.goto('https://chatgpt.com');
          await page.screenshot({path: 'before.png'});
          await page.mouse.click(831, 589);
          await page.waitForTimeout(2000);
          await page.screenshot({path: 'after.png'});
          await browser.close();
          console.log('✅ DONE');
        })();
        EOF
        
        node click.js
    
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Click OK"
