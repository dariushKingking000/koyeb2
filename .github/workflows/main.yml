name: Google Search Results
on: [push, pull_request]

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Playwright
      run: npm init -y && npm i -D @playwright/test@latest && npx playwright install --with-deps
    
    - name: Google "سلام" + Save Results
      run: |
        cat > search.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage();
          await page.goto('https://www.google.com');
          
          // سرچ "سلام"
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          await page.waitForLoadState('networkidle');
          
          // نتایج
          const results = await page.$$eval('.g', elements => 
            elements.slice(0, 5).map(el => ({
              title: el.querySelector('h3')?.innerText || 'No title',
              link: el.querySelector('a')?.href || 'No link',
              snippet: el.querySelector('.VwiC3b')?.innerText || 'No snippet'
            }))
          );
          
          let output = '🔍 نتایج سرچ "سلام":\n\n';
          results.forEach((r, i) => {
            output += `${i+1}. ${r.title}\n   ${r.link}\n   ${r.snippet}\n\n`;
          });
          
          await browser.close();
          require('fs').writeFileSync('google-salams.txt', output);
          console.log('✅ نتایج ذخیره شد!');
        })();
        EOF
        
        node search.js
    
    - name: Commit results to repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add google-salams.txt
        git commit -m "نتایج سرچ سلام" || echo "No changes"
        git push
