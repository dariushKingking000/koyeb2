name: Click Coordinates
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
    
    - name: Click X,Y
      run: |
        npm init -y
        npm i puppeteer
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const config = {
          url: 'https://chatgpt.com',
          x: 831,
          y: 589,
          timestamp: new Date().toISOString()
        };
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          console.log('🚀 Starting browser...');
          const browser = await puppeteer.launch({ 
            headless: true, 
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          const page = await browser.newPage();
          
          await page.setViewport({width: 1920, height: 1080});
          console.log('🌐 Navigating...');
          await page.goto(config.url, { 
            waitUntil: 'domcontentloaded', 
            timeout: 30000 
          });
          
          console.log('📸 Before screenshot');
          await page.screenshot({path: 'before-click.png', fullPage: true});
          
          console.log(`🖱️ Clicking (${config.x}, ${config.y})`);
          await page.mouse.click(config.x, config.y);
          
          await page.evaluate((x, y) => {
            const circle = document.createElement('div');
            circle.style.position = 'fixed';
            circle.style.left = (x - 2) + 'px';
            circle.style.top = (y - 2) + 'px';
            circle.style.width = '4px';
            circle.style.height = '4px';
            circle.style.backgroundColor = 'red';
            circle.style.borderRadius = '50%';
            circle.style.border = '1px solid white';
            circle.style.zIndex = '99999';
            document.body.appendChild(circle);
          }, config.x, config.y);
          
          console.log('⏳ Waiting 10s...');
          await page.waitForTimeout(10000);
          
          console.log('📸 After screenshot');
          await page.screenshot({path: 'after-click.png', fullPage: true});
          await browser.close();
          console.log('✅ Done!');
        })().catch(e => {
          console.error('❌ Error:', e.message);
          process.exit(1);
        });
        EOF
        node click.js
    
    - name: Commit
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add *.png config.json
        git commit -m "🎯 Click (831,589) [skip ci]" || exit 0
        git push || exit 0
