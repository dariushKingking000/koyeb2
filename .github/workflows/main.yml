name: Create TXT

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run apper.py
        run: python apper.py

      - name: Show output.txt content
        run: cat output.txt

      - name: Upload output.txt as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-file
          path: output.txt

      - name: Commit and Push output.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output.txt
          git diff --staged --quiet || git commit -m "Add output.txt [skip ci]"
          git push
