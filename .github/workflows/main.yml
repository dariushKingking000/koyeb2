name: Stealth Recorder
on: [push]
permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install
      run: |
        rm -rf node_modules package*.json || true
        npm init -y
        npm i puppeteer-core@latest puppeteer-extra puppeteer-extra-plugin-stealth ffmpeg-static
        
    - name: Create User Data Dir
      run: mkdir -p user_data record
        
    - name: Recorder Script
      run: |
        cat > record.js << 'EOF'
        const puppeteer = require('peteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());
        const fs = require('fs');
        
        const TEXT_TO_TYPE = 'سلام! چطوری؟';
        const CLICK_X = 134;
        const CLICK_Y = 254;
        
        (async () => {
          const browser = await puppeteer.launch({
            headless: false,
            userDataDir: './user_data',
            executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome',
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--window-size=1366,768',
              '--start-maximized'
            ]
          });
          
          const page = await browser.newPage();
          await page.setViewport({width:1366, height:768});
          
          // 👇 Screen recording شروع
          const { spawn } = require('child_process');
          const ffmpeg = require('ffmpeg-static');
          
          const recordProc = spawn(ffmpeg, [
            '-f', 'x11grab',
            '-s', '1366x768',
            '-r', '30',
            '-i', ':0.0',
            '-t', '30',  // 30 ثانیه
            '-c:v', 'libx264',
            '-pix_fmt', 'yuv420p',
            './record/demo.mp4'
          ]);
          
          console.log('🎥 ضبط شروع شد...');
          
          // ChatGPT
          await page.goto('https://chatgpt.com', {timeout: 60000});
          await new Promise(r => setTimeout(r, 3000));
          
          await page.screenshot({path: 'step1.png'});
          
          // کلیک
          console.log('🖱️ کلیک: (' + CLICK_X + ', ' + CLICK_Y + ')');
          await page.mouse.click(CLICK_X, CLICK_Y);
          await new Promise(r => setTimeout(r, 2000));
          
          await page.screenshot({path: 'step2.png'});
          
          // تایپ
          console.log('⌨️ تایپ: ' + TEXT_TO_TYPE);
          await page.keyboard.type(TEXT_TO_TYPE, {delay: 80});
          await new Promise(r => setTimeout(r, 3000));
          
          await page.screenshot({path: 'step3.png'});
          
          // پایان ضبط
          recordProc.kill('SIGINT');
          await new Promise(r => setTimeout(r, 2000));
          
          await browser.close();
          console.log('✅ ✅ ویدیو آماده: demo.mp4');
        })().catch(console.error);
        EOF
        
    - name: Run Recorder
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1366x768x24 &
        sleep 2
        node record.js
        
    - name: Commit Video & Screenshots
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add *.png *.mp4 record.js package*.json || true
        git rm -r --cached user_data || true
        git commit -m "🎥 Video recorded $(date +%Y-%m-%d\ %H:%M:%S)" || true
        git push origin HEAD:main || true
