name: Test & Commit TXT to Repo
on: [push, pull_request]

permissions:
  contents: write  # اجازه commit

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Playwright
      run: npm init -y && npm i -D @playwright/test@latest && npx playwright install --with-deps
    
    - name: Google Test + TXT
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto('https://google.com');
          console.log('✅ Google بارگذاری شد');
          await page.fill('textarea[name="q"]', 'سلام');
          console.log('✅ سلام تایپ شد');
          const title = await page.title();
          console.log('📄 عنوان: ' + title);
          await browser.close();
          console.log('🎉 تست تمام!');
        })();
        EOF
        
        node test.js > test-results.txt 2>&1
        
    - name: Commit test-results.txt to repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add test-results.txt
        git commit -m "Add test-results.txt (سلام test)" || echo "No changes"
        git push
