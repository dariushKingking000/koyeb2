name: Screenshot
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        persist-credentials: true
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install & Setup Playwright
      run: |
        npm init -y
        npm i playwright@1.47.0
        npx playwright install --with-deps chromium webkit
    
    - name: Generate Screenshots
      run: |
        cat > screenshot.js << 'EOF'
        const playwright = require('playwright');
        (async () => {
          const browsers = ['chromium', 'webkit'];
          for (const b of browsers) {
            const browser = await playwright[b].launch({ headless: true });
            const page = await browser.newPage();
            await page.setViewportSize({ width: 1920, height: 1080 });
            await page.goto('https://chatgpt.com', { waitUntil: 'domcontentloaded' });
            await page.screenshot({ path: \`screenshot-\${b}.png\`, fullPage: true });
            await browser.close();
            console.log(\`✅ \${b} screenshot done\`);
          }
          console.log('🎉 All done!');
        })().catch(console.error);
        EOF
        node screenshot.js
    
    - name: List files
      run: ls -la *.png
    
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "📸 Update screenshots [skip ci]"
        file_pattern: '*.png'
