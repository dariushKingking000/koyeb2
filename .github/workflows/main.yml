name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        rm -rf node_modules package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create record.cjs
      run: |
        cat > record/record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');

        (async () => {
          try {
            // دستورات مستقیم
            const instructions = [
              '[click 200 300]'
            ];
            
            console.log(`📋 ${instructions.length} instructions loaded`);
            console.log(`🎬 Starting recording...`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            
            await new Promise(resolve => setTimeout(resolve, 5000));
            console.log('🌐 ChatGPT loaded successfully');

            const selectors = [
              'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
              'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`🔄 #${i + 1}/${instructions.length}: ${cmd}`);
              
              if (cmd.startsWith('[type ')) {
                console.log('🔍 Searching for input...');
                let found = false;
                
                for (const selector of selectors) {
                  try {
                    await page.waitForSelector(selector, { timeout: 3000 });
                    const el = await page.$(selector);
                    const box = await el.boundingBox();
                    console.log(`✅ ${selector}: (${Math.round(box.x)}, ${Math.round(box.y)}) ${Math.round(box.width)}x${Math.round(box.height)}`);
                    
                    await el.click();
                    const text = cmd.slice(6, -1);
                    await page.keyboard.type(text, { delay: 80 });
                    console.log(`✅ "${text}" typed successfully`);
                    found = true;
                    break;
                  } catch(e) {}
                }
                
                if (!found) {
                  console.log('⚠️ Input not found → Enter');
                  await page.keyboard.press('Enter');
                }
                
              } else if (cmd.startsWith('[click ')) {
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                console.log(`🖱️ Clicking: (${x}, ${y})`);
                await page.mouse.click(x, y);
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ Waiting ${s}s...`);
                await new Promise(resolve => setTimeout(resolve, s * 1000));
              }
            }
            
            console.log('⏳ Waiting 5s before close → Saving video!');
            await new Promise(resolve => setTimeout(resolve, 5000));
            await browser.close();
            console.log('✅ Complete!');
          } catch (e) {
            console.error('❌ Error:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Execute with Xvfb & FFmpeg
      run: |
        rm -f record/*.mp4
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 5
        
        timeout 120s ffmpeg -f x11grab -s 1366x768 -r 25 -i :99.0 \
               -t 120 -c:v libx264 -pix_fmt yuv420p -crf 23 \
               -y ./record/demo_full.mp4 &
        
        FFMPEG_PID=$!
        sleep 5
        
        node record/record.cjs || true
        
        sleep 3
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        sleep 2
        
        ls -la record/ || echo "No record folder"
        du -sh record/* 2>/dev/null || echo "No files found"
    
    - name: Commit record files
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add record/ || echo "No record folder"
        if ! git diff --staged --quiet; then
          git commit -m "🎥 Add screen recording [skip ci]"
          git push
          echo "✅ Pushed successfully!"
        else
          echo "No changes to commit"
        fi
    
    - uses: actions/upload-artifact@v4
      with:
        name: 🎥-recording
        path: record/
        retention-days: 7
