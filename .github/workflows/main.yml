name: Chrome Automation
on: [push]
permissions:
  contents: write

jobs:
  chrome:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Chrome + Tiny Red Dot + 10s Wait
      run: |
        npm init -y &>/dev/null
        npm i playwright canvas &>/dev/null
        npx playwright install chromium &>/dev/null
        
        cat > tiny-dot.js << 'EOF'
        const { chromium } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        const CLICK_X = 134;
        const CLICK_Y = 165;
        const RADIUS = 1; // نقطه ریز قرمز
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          
          await page.goto('https://google.com');
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          await page.waitForTimeout(3000);
          
          await page.mouse.click(CLICK_X, CLICK_Y);
          await page.waitForTimeout(3000);
          
          console.log('⏳ 10s wait...');
          await page.waitForTimeout(10000);
          
          await page.screenshot({path: 'final.png', fullPage: true});
          
          const img = await loadImage('final.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0);
          ctx.beginPath();
          ctx.arc(CLICK_X, CLICK_Y, RADIUS, 0, 2 * Math.PI);
          ctx.fillStyle = '#ff0000';
          ctx.fill();
          ctx.strokeStyle = '#ff0000';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          fs.writeFileSync('chrome-dot.png', canvas.toBuffer('image/png'));
          
          fs.writeFileSync('chrome-state.json', JSON.stringify({
            click: [CLICK_X, CLICK_Y],
            radius: RADIUS,
            wait: '10s',
            title: await page.title(),
            url: page.url(),
            time: new Date().toISOString()
          }, null, 2));
          
          await browser.close();
        })().catch(console.error);
        EOF
        
        node tiny-dot.js
    
    - uses: actions/upload-artifact@v4
      with:
        name: chrome-tiny-dot
        path: |
          chrome-dot.png
          chrome-state.json
    
    - name: Commit
      if: always()
      run: |
        git config --global user.name "Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add chrome-dot.png chrome-state.json || true
        git commit -m "Tiny red dot (r=1) after 10s" || true
        git push || true
