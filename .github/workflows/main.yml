name: Click Ultra Fast
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    # استفاده از action آماده برای Chrome + Puppeteer
    - uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install & Click
      run: |
        npm init -y -s
        npm i puppeteer -s
        
        cat > click.js << 'EOF'
        const puppeteer=require('puppeteer');(async()=>{try{const b=await puppeteer.launch({headless:'new',args:['--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage','--disable-web-security','--disable-features=VizDisplayCompositor']}),p=await b.newPage();await p.setViewport({width:1920,height:1080});await p.goto('https://chatgpt.com',{waitUntil:'networkidle0',timeout:60000});await p.screenshot({path:'before.png'});await p.mouse.click(831,589);await p.waitForTimeout(5000);await p.screenshot({path:'after.png'});await b.close();console.log('✅ Success!');}catch(e){console.error('❌ Error:',e.message);process.exit(1);}})().catch(console.error);
        EOF
        
        node click.js
    
    - name: Commit
      run: |
        git config --global user.name github-actions
        git config --global user.email actions@github.com
        git add *.png || true
        git commit -m "🎯 Click screenshots" || true
        git push || true
