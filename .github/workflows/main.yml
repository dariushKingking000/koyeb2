name: Pure Clicks - NO GIT - Direct Repo Files
on: [push]
permissions:
  contents: write

jobs:
  clicks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node (NO CACHE)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Create Script & Run
      id: create
      run: |
        cat > clicks.js << 'EOF'
        const { chromium } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        const CLICK_X = 134;
        const CLICK_Y = 165;
        
        let state = { url: 'https://google.com', clicks: [] };
        try {
          if (fs.existsSync('click-state.json')) {
            state = JSON.parse(fs.readFileSync('click-state.json', 'utf8'));
          }
        } catch(e) { }
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage({viewport: {width: 1920, height: 1080}});
          
          await page.goto(state.url, {waitUntil: 'networkidle'});
          await page.mouse.click(CLICK_X, CLICK_Y);
          state.clicks.push({x: CLICK_X, y: CLICK_Y, time: new Date().toISOString()});
          
          await page.waitForTimeout(5000);
          await page.screenshot({path: 'clicks-only.png', fullPage: true});
          
          const img = await loadImage('clicks-only.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          state.clicks.slice(-8).forEach((click, i) => {
            ctx.beginPath();
            ctx.arc(click.x, click.y, 3, 0, 2 * Math.PI);
            ctx.fillStyle = '#ff0000';
            ctx.globalAlpha = 0.8 - i*0.1;
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.strokeStyle = '#ff4444';
            ctx.lineWidth = 2;
            ctx.stroke();
          });
          
          fs.writeFileSync('clicks-only.png', canvas.toBuffer('image/png'));
          state.url = page.url();
          state.count = state.clicks.length;
          fs.writeFileSync('click-state.json', JSON.stringify(state, null, 2));
          
          console.log(`✅ ${state.count} clicks - ${state.url}`);
          await browser.close();
        })().catch(e => console.log('Error:', e.message));
        EOF
        
        npm init -y
        npm install playwright canvas
        npx playwright install --with-deps chromium
        node clicks.js
        
        FILE_COUNT=$(ls clicks-only.png click-state.json 2>/dev/null | wc -l)$
        $echo "file_count=$FILE_COUNT" >> $GITHUB_OUTPUT$

    - name: Commit Files
      uses: EndBug/add-and-commit@v9
      $if: steps.create.outputs.file_count > 0$
      with:
        add: 'clicks-only.png click-state.json clicks.js'
        $message: "🤖 Update clicks (${{ steps.create.outputs.file_count }} files)"
