name: 📸 Screen Capture Bot (A)
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        async function takeMultipleScreenshots(page, prefix, count) {
          for(let i = 0; i < count; i++) {
            await page.screenshot({ path: `${prefix}_${i.toString().padStart(2,'0')}.png` });
            if(i < count-1) await new Promise(r => setTimeout(r, 500));
          }
        }
        
        (async () => {
          const browser = await puppeteer.launch({
            headless: false,
            args: ['--no-sandbox', '--disable-dev-shm-usage']
          });
          const page = await browser.newPage();
          await page.setViewport({ width: 1366, height: 768 });
          await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
          
          let frameCount = 0;
          
          const instructions = [
            {type: 'screenshot', count: 10, name: 'start_page'},
            {type: 'click', x: 564, y: 264, name: 'click_email'},
            {type: 'screenshot', count: 10, name: 'email_field_focused'},
            {type: 'type', text: 'kingking@gmail.com', name: 'typing_email'},
            {type: 'screenshot', count: 10, name: 'email_typed'},
            {type: 'click', x: 640, y: 330, name: 'click_password'},
            {type: 'screenshot', count: 10, name: 'password_field_focused'},
            {type: 'wait', secs: 10, name: 'waiting_otp'},
            {type: 'screenshot', count: 10, name: 'before_otp'},
            {type: 'type', text: 'pass.txt', name: 'typing_pass'},
            {type: 'screenshot', count: 10, name: 'password_typed'},
            {type: 'click', x: 583, y: 492, name: 'submit'},
            {type: 'screenshot', count: 20, name: 'final_result'}
          ];
          
          for(let instr of instructions) {
            console.log(`🔄 ${instr.name}`);
            
            if(instr.type === 'screenshot') {
              await takeMultipleScreenshots(page, `frame_${frameCount.toString().padStart(3,'0')}_${instr.name}`, instr.count);
              frameCount++;
              
            } else if(instr.type === 'click') {
              await page.mouse.click(instr.x, instr.y);
              await new Promise(r => setTimeout(r, 1000));
              await takeMultipleScreenshots(page, `frame_${frameCount.toString().padStart(3,'0')}_${instr.name}`, 10);
              frameCount++;
              
            } else if(instr.type === 'type') {
              if(instr.text === 'pass.txt') {
                console.log('🔍 منتظر OTP از B...');
                let otp = '';
                let attempts = 0;
                
                while(attempts < 30) {
                  try {
                    execSync('git fetch origin main && git reset --hard origin/main', {timeout: 30000});
                    if(fs.existsSync('numbers.txt')) {
                      otp = fs.readFileSync('numbers.txt', 'utf8').trim();
                      if(otp.length === 6 && /^\d{6}$/.test(otp)) break;
                    }
                  } catch(e) {}
                  attempts++;
                  await new Promise(r => setTimeout(r, 30000));
                }
                
                if(!otp) throw new Error('❌ B OTP نفرستاد!');
                
                for(let char of otp) {
                  await page.keyboard.type(char, {delay: 300});
                }
              } else {
                for(let char of instr.text) {
                  await page.keyboard.type(char, {delay: 150});
                }
              }
              await takeMultipleScreenshots(page, `frame_${frameCount.toString().padStart(3,'0')}_${instr.name}`, 10);
              frameCount++;
              
            } else if(instr.type === 'wait') {
              await new Promise(r => setTimeout(r, instr.secs * 1000));
              await takeMultipleScreenshots(page, `frame_${frameCount.toString().padStart(3,'0')}_${instr.name}`, 10);
              frameCount++;
            }
          }
          
          await browser.close();
          console.log(`✅ تمام! ${frameCount} سری frame (حدود 150+ عکس)`);
        })();
        EOF
    
    - name: Run Capture
      run: |
        rm -rf *.png numbers.txt screenshots/
        git pull origin main --force
        mkdir -p screenshots
        Xvfb :99 -screen 0 1366x768x24 &
        export DISPLAY=:99
        node capture.cjs
    
    - name: Commit screenshots to repo
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        ls -la screenshots/ | tail -20
        
        git add screenshots/*.png || true
        
        if git diff --staged --quiet; then
          echo "هیچ فایلی برای کامیت نیست"
        else
          git commit -m "📸 Added screenshots $(ls screenshots/ | wc -l) files $(date)"
          git push
          echo "✅ اسکرین‌شات‌ها در repo آپلود شد"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
