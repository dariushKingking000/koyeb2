name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup
      run: mkdir -p record
    
    - name: Create record.js
      run: |
        cat > record.js << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        (async () => {
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور\n🎥 ضبط...`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await page.waitForTimeout(2000);

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`🔄 #${i + 1}/${instructions.length}: ${cmd}`);
              
              if (cmd.startsWith('[type ')) {
                const text = cmd.slice(6, -1);
                await page.click('textarea');
                await page.keyboard.type(text, { delay: 80 });
                console.log(`✅ "${text}"`);
              } else if (cmd.startsWith('[click ')) {
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                await page.mouse.click(x, y);
                console.log(`🖱️ (${x},${y})`);
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                await page.waitForTimeout(s * 1000);
                console.log(`⏳ ${s}s`);
              }
            }
            
            await page.waitForTimeout(5000);
            await browser.close();
            console.log('🎉 اسکریپت اجرا شد!');
          } catch (e) {
            console.error('❌ خطا:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Execute with Xvfb & FFmpeg
      run: |
        # Start Xvfb
        Xvfb :99 -screen 0 1366x768x24 &
        export DISPLAY=:99
        sleep 3
        
        # Start FFmpeg recording
        ffmpeg -f x11grab -s 1366x768 -r 25 -i :99.0 \
               -t 300 -c:v libx264 -pix_fmt yuv420p \
               ./record/demo_full.mp4 &
        
        FFMPEG_PID=$!
        sleep 2
        
        # Run puppeteer script
        node record.js
        
        # Stop FFmpeg
        kill $FFMPEG_PID
        sleep 2
        
        mv demo_full.mp4 record/
    
    - uses: actions/upload-artifact@v4
      with:
        name: 🎥-complete
        path: |
          record/
          instructions.txt
