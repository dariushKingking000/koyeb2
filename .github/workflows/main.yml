name: Anti-Cloudflare Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # MAX
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
        
    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install deps
      run: |
        npm init -y
        npm i puppeteer@22 puppeteer-extra@3.3.6 puppeteer-extra-plugin-stealth@2.11.2
        
    - name: Run Stealth Click
      run: node click.js
      timeout-minutes: 40
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots
        path: |
          *.png
          *.json
          status.txt
          package.json
