name: Click Super Fast
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    
    - uses: microsoft/playwright-github-action@v1
    
    - name: Click
      run: |
        npm init -y
        npm i playwright
        
        cat > click.js << 'EOF'
        const { chromium } = require('playwright');
        const fs = require('fs');
        
        (async () => {
          const config = {
            url: 'https://chatgpt.com',
            x: 831, y: 589,
            ts: new Date().toISOString()
          };
          fs.writeFileSync('config.json', JSON.stringify(config));
          
          const browser = await chromium.launch({ 
            headless: true,
            args: ['--no-sandbox']
          });
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1920, height: 1080 });
          
          await page.goto(config.url, { 
            waitUntil: 'load',
            timeout: 60000 
          });
          
          await page.screenshot({ path: 'before.png' });
          await page.mouse.click(config.x, config.y);
          
          await page.addStyleTag({
            content: `
              div#marker {
                position: fixed; left: ${config.x-2}px; top: ${config.y-2}px;
                width: 4px; height: 4px; background: red;
                border-radius: 50%; border: 1px solid white;
                z-index: 99999; pointer-events: none;
              }
            `
          });
          document.body.insertAdjacentHTML('beforeend', '<div id="marker"></div>');
          
          await page.waitForTimeout(10000);
          await page.screenshot({ path: 'after.png' });
          await browser.close();
        })();
        EOF
        
        node click.js
    
    - name: Commit
      run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git add *.png config.json
        git commit -m "🎯 Click OK" || exit 0
        git push || exit 0
