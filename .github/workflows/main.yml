name: Super Fast Clicker
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
    
    - name: Fast Click NO NPM
      run: |
        curl -sL https://raw.githubusercontent.com/puppeteer/puppeteer/main/src/install.js | node --no-warnings
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer');
        (async () => {
          try {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({width: 1920, height: 1080});
            await page.goto('https://chatgpt.com', {timeout: 20000});
            await page.screenshot({path: 'before.png'});
            await page.mouse.click(831, 589);
            await page.waitForTimeout(2000);
            await page.screenshot({path: 'after.png'});
            await browser.close();
          } catch(e) {}
        })();
        EOF
        node click.js
    
    - name: Commit
      run: |
        git config --global user.name "ClickBot"
        git config --global user.email "bot@github.com"
        git add before.png after.png || true
        git commit -m "⚡ FastClick" || true
        git push || true
