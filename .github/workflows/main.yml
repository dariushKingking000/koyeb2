name: Clean Screenshots
on: workflow_dispatch  # فقط دستی ران کن
jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Force delete screenshots
      run: |
        rm -rf screenshots/
        git config user.name "Clean Bot"
        git config user.email "bot@github.com"
        git add .
        git commit -m "🧹 Clean screenshots" || exit 0
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
