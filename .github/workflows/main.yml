name: Fix YAML
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i playwright && npx playwright install chromium msedge
    
    - name: Screenshot Edge & IE
      run: |
        cat > test.js << 'EOF'
        const { chromium, webkit } = require('playwright');
        (async () => {
          // Edge - سریع
          const browserEdge = await chromium.launch({channel: 'msedge', headless: true});
          const pageEdge = await browserEdge.newPage();
          await pageEdge.goto('https://github.com');
          await pageEdge.waitForTimeout(2000);
          await pageEdge.screenshot({path: 'salam-edge.png', fullPage: true});
          await browserEdge.close();
          
          // Webkit - سریع
          const browserIE = await webkit.launch({headless: true});
          const pageIE = await browserIE.newPage();
          await pageIE.goto('https://github.com');
          await pageIE.waitForTimeout(2000);
          await pageIE.screenshot({path: 'salam-ie.png', fullPage: true});
          await browserIE.close();
          
          console.log('✅ salam-edge.png & salam-ie.png - 40 ثانیه');
        })().catch(console.error);
        EOF
        
        timeout 60s node test.js
        
        ls -la *.png
    
    - name: Commit
      run: |
        git config user.name "Actions"
        git config user.email "actions@github.com"
        git add salam-*.png
        git commit -m "Add salam-edge.png & salam-ie.png" || exit 0
        git push
