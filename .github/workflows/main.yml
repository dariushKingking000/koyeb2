name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup Node & Puppeteer
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install packages
      run: |
        rm -f package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create record.cjs
      run: |
        cat > record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        async function safeWait(timeout) {
          return new Promise(resolve => setTimeout(resolve, timeout));
        }

        (async () => {
          let browser = null;
          let page = null;
          
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور`);
            
            browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0', timeout: 15000 });
            await safeWait(3000);
            console.log('🌐 ChatGPT آماده');
            
            const selectors = [
              'div[contenteditable]', 'textarea', '[contenteditable="true"]', 
              '[data-id="root"] textarea', '.ProseMirror', '[role="textbox"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`#${i+1}/${instructions.length}: ${cmd}`);
              
              if (!page || page.isClosed?.()) {
                console.log('⚠️ Page بسته');
                break;
              }
              
              // هر دستور دقیق 20s max
              const start = Date.now();
              const maxTime = 20000;
              
              if (cmd.startsWith('[type ')) {
                console.log('⌨️ تایپ (20s max)...');
                const text = cmd.slice(6, -1);
                
                try {
                  // 3s تلاش selector
                  await page.waitForSelector(selectors.join(','), { timeout: 3000 });
                  await page.click(selectors.join(','));
                  await page.keyboard.type(text, { delay: 25 });
                  await page.keyboard.press('Enter');
                  console.log(`✅ "${text}"`);
                } catch {
                  await page.keyboard.type(text, { delay: 25 });
                  await page.keyboard.press('Enter');
                  console.log(`✅ "${text}"`);
                }
                
              } else if (cmd.startsWith('[click ')) {
                console.log('🖱️ کلیک (20s max)...');
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                
                try {
                  await page.mouse.click(x, y);
                  console.log(`✅ کلیک (${x},${y})`);
                } catch {
                  console.log('⚠️ کلیک');
                }
                
              } else if (cmd.startsWith('[wait ')) {
                const s = Math.min(parseInt(cmd.slice(6, -1)), 20);
                console.log(`⏳ ${s}s`);
                await safeWait(s * 1000);
              }
              
              // دقیق 20s کل دستور
              const elapsed = Date.now() - start;
              const remaining = Math.max(0, maxTime - elapsed);
              if (remaining > 0) await safeWait(remaining);
              
              const totalTime = Math.round((Date.now() - start) / 1000);
              if (i === instructions.length - 1) {
                console.log('🏁 تمام شد!');
              } else {
                console.log(`⏱️ ${totalTime}s تمام → #${i+2}`);
              }
            }
            
          } catch(e) {
            console.log('❌ خطا:', e.message);
          } finally {
            console.log('🔒 بستن...');
            try { if (page) await page.close(); } catch(e) {}
            try { if (browser) await browser.close(); } catch(e) {}
            console.log('✅ OK');
          }
        })();
        JS_EOF
    
    - name: Record & Commit to Repo
      run: |
        Xvfb :99 -screen 0 1366x768x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        sleep 3
        
        ffmpeg -loglevel error -f x11grab -draw_mouse 1 \
          -s 1366x768 -r 30 -i :99 \
          -t 180 -c:v libx264 -crf 18 -preset medium \
          -pix_fmt yuv420p screen-record.mp4 &
        
        FFMPEG_PID=$!
        sleep 2
        
        node record.cjs
        
        sleep 3
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        pkill -f Xvfb || true
        
        git config --global user.name "Auto Record Bot"
        git config --global user.email "bot@github.com"
        git add screen-record.mp4 instructions.txt record.cjs
        git commit -m "🎥 $(date '+%Y-%m-%d %H:%M') | $(du -h screen-record.mp4 | cut -f1)" || true
        git push
        
        ls -la screen-record.mp4
        du -sh screen-record.mp4
