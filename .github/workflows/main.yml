name: Simple Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Chrome + Playwright Click
      run: |
        # Node
        curl -fsSL https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.xz | tar -xJ
        export PATH="$PWD/node-v20.11.1-linux-x64/bin:$PATH"
        
        # Chrome
        sudo apt-get update -qq
        sudo apt-get install -y wget gnupg -qq
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update -qq
        sudo apt-get install -y google-chrome-stable -qq
        
        # Playwright (بدون npm dependency issues)
        npm init -y
        npm install playwright-core@1.40.0
        
        cat > click.js << 'EOF'
        const { chromium } = require('playwright-core');
        (async () => {
          const browser = await chromium.launch({
            headless: true,
            executablePath: '/usr/bin/google-chrome-stable',
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1366, height: 768 });
          await page.goto('https://chatgpt.com');
          await page.screenshot({ path: 'before.png' });
          
          // Wait & Click first button
          await page.waitForTimeout(5000);
          await page.click('button, [role="button"]', { timeout: 10000 });
          await page.waitForTimeout(3000);
          await page.screenshot({ path: 'after.png' });
          
          await browser.close();
          console.log('✅ Click completed!');
        })();
        EOF
        
        node click.js
        
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto Click"
