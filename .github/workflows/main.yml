name: NO NPM Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Chrome + Node + Click
      run: |
        # Node
        curl -fsSL https://nodejs.org/dist/v20.11.1/node-v20.11.1-linux-x64.tar.xz | tar -xJ
        export PATH="$PWD/node-v20.11.1-linux-x64/bin:$PATH"
        node --version
        
        # Chrome
        sudo apt-get update -qq
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update -qq
        sudo apt-get install -y google-chrome-stable -qq
        google-chrome --version
        
        # Puppeteer با رفع dependency
        npm init -y
        npm install puppeteer-core@22.0.0
        
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer-core');
        (async () => {
          try {
            const browser = await puppeteer.launch({
              headless: 'new',
              executablePath: '/usr/bin/google-chrome-stable',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await page.screenshot({path: 'before.png'});
            
            // کلیک با selector به جای مختصات
            await page.waitForSelector('button[as="button"]', {timeout: 10000});
            await page.click('button[as="button"]:visible');
            await page.waitForTimeout(3000);
            
            await page.screenshot({path: 'after.png'});
            await browser.close();
            console.log('✅ DONE');
          } catch (error) {
            console.error('❌ Error:', error.message);
            process.exit(1);
          }
        })();
        EOF
        
        node click.js
        
    - uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Click OK"
