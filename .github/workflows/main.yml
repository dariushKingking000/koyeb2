name: 📸 Screen Capture Bot (A)
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        (async () => {
          const browser = await puppeteer.launch({
            headless: false,
            args: ['--no-sandbox', '--disable-dev-shm-usage']
          });
          const page = await browser.newPage();
          await page.setViewport({ width: 1366, height: 768 });
          await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
          
          const instructions = [
            '[click 564 264]',
            '[type kingking@gmail.com]',
            '[wait 5]',
            '[click 640 330]',
            '[wait 10]',
            '[type pass.txt]',  // ← اینجا منتظر B
            '[click 583 492]'
          ];
          
          let frame = 0;
          
          for(let i = 0; i < instructions.length; i++) {
            const cmd = instructions[i];
            console.log(`🔄 ${cmd}`);
            
            await page.screenshot({ path: `frame_${frame++}.png` });
            
            if(cmd.startsWith('[type pass.txt]')) {
              console.log('🔍 منتظر OTP از B...');
              let otp = '';
              let attempts = 0;
              
              while(attempts < 30) {  // 15 دقیقه صبر
                try {
                  execSync('git fetch origin main && git reset --hard origin/main', {timeout: 30000});
                  if(fs.existsSync('numbers.txt')) {
                    otp = fs.readFileSync('numbers.txt', 'utf8').trim();
                    console.log(`📄 B فرستاد: "${otp}" (${otp.length} chars)`);
                    
                    if(otp.length === 6 && /^\d{6}$/.test(otp)) {
                      console.log(`✅ OTP OK: ${otp}`);
                      break;
                    }
                  }
                } catch(e) {}
                
                attempts++;
                console.log(`⏳ منتظر B... (${attempts}/30)`);
                await new Promise(r => setTimeout(r, 30000));
              }
              
              if(!otp) throw new Error('❌ B OTP نفرستاد!');
              
              // تایپ OTP
              await page.keyboard.type(otp, {delay: 200});
              console.log(`✅ OTP تایپ شد: ${otp}`);
              
            } else if(cmd.startsWith('[type ')) {
              const text = cmd.slice(6, -1);
              await page.keyboard.type(text, {delay: 150});
            } else if(cmd.startsWith('[click ')) {
              const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
              await page.mouse.click(x, y);
            } else if(cmd.startsWith('[wait ')) {
              const secs = parseInt(cmd.slice(6, -1));
              await new Promise(r => setTimeout(r, secs * 1000));
            }
            
            await page.screenshot({ path: `frame_${frame++}.png` });
          }
          
          await browser.close();
          console.log('✅ تمام!');
        })();
        EOF
    
    - name: Run Capture
      run: |
        rm -rf *.png numbers.txt
        git pull origin main --force
        Xvfb :99 -screen 0 1366x768x24 &
        export DISPLAY=:99
        node capture.cjs
    
    - name: ZIP & Upload
      run: |
        zip -r screenshots.zip *.png
        ls -la *.png
      if: always()
    
    - uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: screenshots.zip
