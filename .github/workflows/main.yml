name: 📸 Screen Capture Bot (A)
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        async function continuousCapture(page, prefix, durationMs = 5000) {
          mkdirSync('screenshots', { recursive: true });
          const startTime = Date.now();
          let frameNum = 1;
          
          console.log(`📸 شروع ${prefix} (${durationMs/1000}s)`);
          
          while(Date.now() - startTime < durationMs) {
            await page.screenshot({ 
              path: `screenshots/${prefix}_f${frameNum}.png`, 
              fullPage: false 
            });
            console.log(`📸 ${prefix}_f${frameNum}.png`);
            frameNum++;
            await new Promise(r => setTimeout(r, 1000));
          }
          console.log(`✅ ${prefix} تمام (${frameNum-1} frame)\n`);
        }
        
        function mkdirSync(dir, opts) {
          try { fs.mkdirSync(dir, opts); } catch(e) {}
        }
        
        (async () => {
          console.log('🚀 Screen Capture Bot شروع شد\n');
          
          const browser = await puppeteer.launch({
            headless: false,
            args: [
              '--no-sandbox', 
              '--disable-dev-shm-usage',
              '--disable-gpu',
              '--disable-background-timer-throttling',
              '--disable-backgrounding-occluded-windows',
              '--disable-renderer-backgrounding'
            ]
          });
          const page = await browser.newPage();
          await page.setViewport({ width: 1366, height: 768 });
          await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
          console.log('✅ صفحه n8n لود شد\n');
          
          let actionCount = 0;
          const instructions = [
            '[click 564 264]',
            '[type kingking@gmail.com]',
            '[wait 5]',
            '[click 640 330]',
            '[wait 10]',
            '[type pass.txt]',
            '[click 583 492]'
          ];
          
          const selectors = [
            'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
            'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]',
            'input[type="text"]', 'input[type="email"]', '#email', '#username'
          ];
          
          // Capture اولیه
          await continuousCapture(page, `start_0_initial`, 5000);
          actionCount++;
          
          for(let action of instructions) {
            console.log(`🔄 STEP ${actionCount}: ${action}`);
            
            // قبل از action
            await continuousCapture(page, `${actionCount}_before_${action.replace(/[\[\] ]/g,'')}`, 5000);
            
            if(action.startsWith('[type ')){
              const text = action.slice(6, -1).trim();
              
              if(text === 'pass.txt'){
                console.log('🔍 منتظر اعداد از B...');
                let passContent = '';
                let attempts = 0;
                
                while(true){
                  try {
                    passContent = execSync('git pull origin main --quiet 2>/dev/null || true && cat numbers.txt 2>/dev/null || echo ""', 
                      {encoding: 'utf8', timeout: 15000}).trim();
                    
                    console.log(`📄 numbers.txt: "${passContent}" (${passContent.length} chars)`);
                    
                    if(passContent.length === 6 && /^\d{6}$/.test(passContent)){
                      console.log(`✅ اعداد از B رسید: ${passContent}`);
                      break;
                    }
                  }catch(e){
                    console.log(`⏳ B هنوز نفرستاده... (${++attempts})`);
                  }
                  await new Promise(r=>setTimeout(r, 30000));
                }
                
                // تایپ رمز
                let found = false;
                for(const selector of selectors){
                  try{
                    await page.waitForSelector(selector, {timeout: 3000});
                    const el = await page.$(selector);
                    if(el){
                      await el.click({force: true});
                      await page.waitForTimeout(500);
                      await page.keyboard.type(passContent, {delay: 150});
                      console.log(`✅ رمز تایپ شد: ${passContent}`);
                      found = true;
                      break;
                    }
                  }catch(e){}
                }
                if(!found) await page.keyboard.type(passContent, {delay: 150});
                
              }else{
                let found = false;
                for(const selector of selectors){
                  try{
                    await page.waitForSelector(selector, {timeout: 3000});
                    const el = await page.$(selector);
                    if(el){
                      await el.click({force: true});
                      await page.waitForTimeout(500);
                      await page.keyboard.type(text, {delay: 150});
                      found = true;
                      break;
                    }
                  }catch(e){}
                }
                if(!found) await page.keyboard.type(text, {delay: 150});
              }
              
            }else if(action.startsWith('[click ')){
              const [x, y] = action.slice(7, -1).split(' ').map(Number);
              await page.mouse.click(x, y);
              console.log(`🖱️ Clicked (${x},${y})`);
              
            }else if(action.startsWith('[wait ')){
              const s = parseInt(action.slice(6, -1));
              console.log(`⏳ Wait ${s}s`);
              await new Promise(r=>setTimeout(r, s*1000));
            }
            
            // بعد از action
            await continuousCapture(page, `${actionCount}_after_${action.replace(/[\[\] ]/g,'')}`, 5000);
            actionCount++;
          }
          
          // نهایی
          await continuousCapture(page, `end_final_result`, 5000);
          await browser.close();
          
          const totalFrames = require('child_process').execSync('ls screenshots/*.png 2>/dev/null | wc -l', {encoding: 'utf8'}).trim();
          console.log(`🎉 تمام! کل ${totalFrames} frame گرفته شد`);
        })();

        EOF
    
    - name: Run Capture
      run: |
        rm -rf screenshots/ *.png numbers.txt
        git pull origin main --force
        mkdir -p screenshots
        export DISPLAY=:99
        Xvfb :99 -screen 0 1366x768x24 -ac -noreset &
        sleep 2
        node capture.cjs
        pkill Xvfb || true
    
    - name: Stats & Commit
      run: |
        TOTAL=$(ls screenshots/*.png 2>/dev/null | wc -l)
        echo "📊 $TOTAL اسکرین‌شات گرفته شد"
        ls -la screenshots/ | head -10
        
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png || true
        
        if [ "$TOTAL" -gt 0 ]; then
          git commit -m "📸 $TOTAL frames captured $(date) [skip ci]" || true
          git push || true
          echo "✅ Push شد"
        else
          echo "⚠️ فایلی نیست"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
