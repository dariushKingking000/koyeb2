name: Stealth Click FIXED
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Puppeteer
      run: |
        npm init -y
        npm i puppeteer@latest puppeteer-extra@latest puppeteer-extra-plugin-stealth@latest
        
    - name: Click Script
      run: |
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());
        
        (async () => {
          console.log('🚀 Launching Chrome...');
          
          const browser = await puppeteer.launch({
            headless: true,
            executablePath: process.env.CHROME_BIN,
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-gpu'
            ]
          });
          
          const page = await browser.newPage();
          await page.setViewport({width: 1366, height: 768});
          
          console.log('🌐 ChatGPT...');
          await page.goto('https://chatgpt.com', {
            waitUntil: 'domcontentloaded',
            timeout: 60000
          });
          
          await new Promise(r => setTimeout(r, 5000));
          
          await page.screenshot({path: 'before.png', fullPage: true});
          
          console.log('🖱️ Click 134,254');
          await page.mouse.click(134, 254);
          
          await page.evaluate(function(x) {
            var circle = document.createElement('div');
            circle.style.cssText = 'position:fixed;left:'+(x-10)+'px;top:244px;width:20px;height:20px;background:red;border-radius:50%;z-index:99999;box-shadow:0 0 10px red';
            document.body.appendChild(circle);
          }, 134);
          
          await new Promise(r => setTimeout(r, 3000));
          
          await page.screenshot({path: 'after.png', fullPage: true});
          
          console.log('✅ COMPLETE');
          await browser.close();
        })().catch(console.error);
        EOF
        
    - name: Run Click
      run: node click.js
      env:
        CHROME_BIN: ${{ steps.chrome.outputs.executable_path }}$
        
    - name: FORCE COMMIT
      run: |
        $git config user.name "github-actions[bot]"$
        $git config user.email "41898282+github-actions[bot]@users.noreply.github.com"$
        git add *.png || true
        git commit -m "🎯 Click Results - (date)" || true
        git push || true
        
    - name: Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: '*.png'
