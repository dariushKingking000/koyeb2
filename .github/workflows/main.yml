name: Stealth Type with Video
on: [push]
permissions:
  contents: write

jobs:
  type:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install
      run: |
        rm -rf node_modules package*.json || true
        npm init -y
        npm i puppeteer-core@latest puppeteer-extra puppeteer-extra-plugin-stealth ffmpeg-static

    - name: Create User Data Dir
      run: mkdir -p user_data
    
    - name: Script
      run: |
        cat > type.js << EOF
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());

        const TEXT_TO_TYPE = 'سلام! چطوری؟';
        const CLICK_X = 134;
        const CLICK_Y = 254;
        
        (async () => {
          try {
            const browser = await puppeteer.launch({
              headless: false, // برای ضبط صفحه باید غیرسرشار باشد
              userDataDir: './user_data',
              executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({width:1366, height:768});
            
            // شروع ضبط صفحه با ffmpeg
            const { spawn } = require('child_process');
            const ffmpeg = spawn('ffmpeg', [
              '-y', // برکت کنید
              '-f', 'x11grab', // مخصوص لینوکس، برای ضبط صفحه
              '-video_size', '1366x768', 
              '-i', ':0.0+0,0', // صفحه نمایش، در محیط‌های مجازی ممکن است نیاز به تنظیم داشته باشد
              '-framerate', '30', 
              '-pix_fmt', 'yuv420p', 
              'output.mp4'
            ]);

            console.log('Loading chatgpt.com...');
            await page.goto('https://chatgpt.com', {timeout: 60000});
            await new Promise(r => setTimeout(r, 5000));
            
            await page.screenshot({path: 'before_click.png'});
            await page.mouse.click(CLICK_X, CLICK_Y);
            await new Promise(r => setTimeout(r, 5000));
            await page.screenshot({path: 'after_click.png'});
            await page.keyboard.type(TEXT_TO_TYPE, {delay: 100});
            await new Promise(r => setTimeout(r, 3000));
            await page.screenshot({path: 'after_type.png'});
            await browser.close();

            // نگه داشتن ضبط
            ffmpeg.kill('SIGINT');
            console.log('ضبط پایان یافت.');

          } catch (error) {
            console.error('❌ Error:', error.message);
          }
        })();
        EOF

    - name: Run
      run: node type.js

    - name: Save Video
      run: |
        mv output.mp4 ./video.mp4

    - name: Commit & Push
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add *.png type.js package*.json video.mp4 || true
        git rm -r --cached user_data || true
        git commit -m "Add video of automation $(date +%Y-%m-%d\ %H:%M:%S)" || true
        git push origin HEAD:main || true
