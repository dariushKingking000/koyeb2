name: Firefox Clicks - Anti-Captcha
on: [push]
permissions:
  contents: write

jobs:
  clicks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install Firefox
      run: |
        npm init -y
        npm i playwright canvas
        npx playwright install --with-deps firefox
    
    - name: Generate Clicks
      run: |
        cat > clicks.js << 'EOF'
        const { firefox } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        let state;
        try {
          if (fs.existsSync('chrome-state.json')) {
            state = JSON.parse(fs.readFileSync('chrome-state.json', 'utf8'));
          } else {
            state = { click: [134, 165], radius: 1, wait: '10s', title: 'Mozilla Firefox', url: 'https://www.mozilla.org/en-US/firefox/new/' };
          }
        } catch(e) { 
          state = { click: [134, 165], radius: 1, wait: '10s', title: 'Mozilla Firefox', url: 'https://www.mozilla.org/en-US/firefox/new/' };
        }
        
        const [CLICK_X, CLICK_Y] = state.click;
        const WAIT_MS = state.wait === '10s' ? 10000 : 5000;
        
        (async () => {
          const browser = await firefox.launch({ 
            headless: true,
            args: ['--no-sandbox', '--disable-blink-features=AutomationControlled']
          });
          const context = await browser.newContext({
            userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Firefox/120.0',
            viewport: { width: 1920, height: 1080 }
          });
          const page = await context.newPage();
          
          // Anti-detection
          await page.addInitScript(() => {
            Object.defineProperty(navigator, 'webdriver', { get: () => undefined });
            delete navigator.__proto__.webdriver;
          });
          
          await page.goto(state.url, { 
            waitUntil: 'networkidle',
            timeout: 30000 
          });
          
          await page.waitForTimeout(3000);
          await page.mouse.click(CLICK_X, CLICK_Y);
          
          await page.waitForTimeout(WAIT_MS);
          await page.screenshot({path: 'firefox-clicks.png', fullPage: true});
          
          const img = await loadImage('firefox-clicks.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          ctx.beginPath();
          ctx.arc(CLICK_X, CLICK_Y, state.radius * 3, 0, 2 * Math.PI);
          ctx.fillStyle = '#ff0000';
          ctx.globalAlpha = 0.7;
          ctx.fill();
          ctx.globalAlpha = 1;
          ctx.strokeStyle = '#ff4444';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          fs.writeFileSync('firefox-clicks.png', canvas.toBuffer('image/png'));
          
          state.title = await page.title();
          state.url = page.url();
          state.time = new Date().toISOString();
          
          fs.writeFileSync('chrome-state.json', JSON.stringify(state, null, 2));
          console.log(`✅ Firefox: ${state.title}`);
          await browser.close();
        })().catch(console.error);
        EOF
        
        node clicks.js
    
    - name: Commit Files
      uses: EndBug/add-and-commit@v10
      with:
        add: 'firefox-clicks.png chrome-state.json'
        message: "🦊 Firefox anti-captcha screenshot"
