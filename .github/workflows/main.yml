name: 🟢 Fixed Temp Email
on:
  push:
  workflow_dispatch:

jobs:
  persistent-email:
    runs-on: ubuntu-latest
    steps:
    - name: 📧 ایمیل ثابت (با SID ذخیره شده)
      id: email
      env:
        SID: ${{ secrets.GUERRILLA_SID }}
      run: |
        if [ -z "$SID" ]; then
          echo "❌ Secret GUERRILLA_SID ست نشده!"
          exit 1
        fi
        
        # دریافت ایمیل با SID ثابت
        RESPONSE=$(curl -s -H "User-Agent: Mozilla/5.0" \
          "https://api.guerrillamail.com/ajax.php?f=get_email_address&sid_token=$SID")
        
        EMAIL=$(echo "$RESPONSE" | grep -o '"email_addr":"[^"]*' | cut -d'"' -f4)
        
        echo "email=$EMAIL" >> $GITHUB_OUTPUT
        echo "::notice:: ✅ ایمیل ثابت: $EMAIL"

    - name: 📥 نمایش inbox
      env:
        SID: ${{ secrets.GUERRILLA_SID }}
      run: |
        # چک ایمیل‌های جدید
        curl -s "https://api.guerrillamail.com/ajax.php?f=check_email&sid_token=$SID" | \
        grep -o '"count":[0-9]*' || echo "📭 خالی"
        
        # جزئیات ایمیل‌ها
        curl -s "https://api.guerrillamail.com/ajax.php?f=fetch_email&sid_token=$SID"

    - name: 🎉 تمام
      run: |
        echo "✅ ایمیل دائمی: ${{ steps.email.outputs.email }}"
        echo "🔄 هر بار همین ایمیل میاد!"

