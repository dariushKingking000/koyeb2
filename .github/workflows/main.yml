name: Pure Clicks Fixed
on: [push]
permissions:
  contents: read

jobs:
  clicks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node & Playwright
      run: |
        npm init -y
        npm i playwright canvas
        npx playwright install chromium
    
    - name: Pure Click Automation
      run: |
        cat > clicks.js << 'EOF'
        const { chromium } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        const CLICK_X = 134;
        const CLICK_Y = 165;
        
        let state = { url: 'https://google.com', clicks: [] };
        if (fs.existsSync('click-state.json')) {
          state = JSON.parse(fs.readFileSync('click-state.json', 'utf8'));
        }
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          
          await page.goto(state.url);
          await page.mouse.click(CLICK_X, CLICK_Y);
          state.clicks.push({x: CLICK_X, y: CLICK_Y});
          
          await page.waitForTimeout(12000);
          
          await page.screenshot({path: 'current.png', fullPage: true});
          
          const img = await loadImage('current.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0);
          
          state.clicks.slice(-10).forEach(click => {
            ctx.beginPath();
            ctx.arc(click.x, click.y, 2, 0, 2 * Math.PI);
            ctx.fillStyle = '#ff4444';
            ctx.fill();
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 3;
            ctx.stroke();
          });
          
          fs.writeFileSync('clicks-only.png', canvas.toBuffer('image/png'));
          
          state.url = page.url();
          state.clicksCount = state.clicks.length;
          
          fs.writeFileSync('click-state.json', JSON.stringify(state, null, 2));
          
          console.log(`✅ ${state.clicksCount} clicks at ${state.url}`);
          await browser.close();
        })().catch(e => console.error('Error:', e.message));
        EOF
        
        node clicks.js
    
    - uses: actions/upload-artifact@v4
      with:
        name: clicks-files
        path: |
          clicks-only.png
          click-state.json
          current.png
