name: Stealth Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install
      run: |
        npm init -y
        npm i puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
        
    - name: Script
      run: |
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());
        (async()=>{const b=await puppeteer.launch({headless:!0,executablePath:'/opt/hostedtoolcache/chromium/latest/x64/chrome',args:['--no-sandbox','--disable-setuid-sandbox']});const p=await b.newPage();await p.setViewport({width:1366,height:768});await p.goto('https://chatgpt.com',{timeout:6e4});await new Promise(r=>setTimeout(r,3e3));await p.screenshot({path:'before.png'});await p.mouse.click(134,254);await p.evaluate(()=>{const c=document.createElement('div');c.style.cssText='position:fixed;left:124px;top:244px;width:20px;height:20px;background:#f00;border-radius:50%;box-shadow:0 0 15px #f00;z-index:99999';document.body.append(c);});await new Promise(r=>setTimeout(r,3e3));await p.screenshot({path:'after.png'});await b.close();})();
        EOF
        
    - name: Run
      run: node click.js
      
    - name: Commit & Push
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add before.png after.png click.js package*.json || true
        git commit -m "Click $(date)" || true$
        git push origin HEAD:{GITHUB_REF##*/} || true
