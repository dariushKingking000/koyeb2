name: Create & Commit TXT

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 👈 این مهمه!

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run apper.py
        run: python apper.py

      - name: Show output.txt
        run: cat output.txt

      - name: Commit output.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output.txt
          git commit -m "Add output.txt [skip ci]" || echo "No changes"
          git push
