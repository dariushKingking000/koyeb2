name: Chrome Automation
on: [push]
permissions:
  contents: write

jobs:
  chrome:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Chrome Headless + Click
      run: |
        npm init -y &>/dev/null
        npm i playwright &>/dev/null
        npx playwright install chromium &>/dev/null
        
        cat > run.js << 'EOF'
        const { chromium } = require('playwright');
        const fs = require('fs');
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          
          await page.goto('https://google.com');
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          await page.waitForTimeout(3000);
          
          // کلیک 134,165
          await page.mouse.click(134, 165);
          await page.waitForTimeout(3000);
          
          // ذخیره state
          fs.writeFileSync('chrome-state.json', JSON.stringify({
            title: await page.title(),
            url: page.url(),
            clicked: true,
            time: new Date().toISOString()
          }, null, 2));
          
          await page.screenshot({path: 'chrome-screenshot.png', fullPage: true});
          await browser.close();
        })().catch(console.error);
        EOF
        
        node run.js
    
    - uses: actions/upload-artifact@v4
      with:
        name: chrome-output
        path: |
          chrome-screenshot.png
          chrome-state.json
    
    - name: Push to main
      run: |
        git config user.name "Actions"
        git config user.email "actions@github.com"
        git add chrome-screenshot.png chrome-state.json || true
        git commit -m "Chrome: screenshot + state (134,165)" || exit 0
        git push || exit 0
