name: Stealth Type with Video Recording
on: [push]
permissions:
  contents: write

jobs:
  type:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install xvfb, ffmpeg, and unzip
      run: sudo apt-get update && sudo apt-get install -y xvfb ffmpeg --no-install-recommends

    - name: Install npm packages
      run: |
        rm -rf node_modules package*.json || true
        npm init -y
        npm i puppeteer-core@latest puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Create User Data Dir
      run: mkdir -p user_data
    
    - name: Create type.js script
      run: |
        cat > type.js << EOF
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());

        const TEXT_TO_TYPE = 'سلام! چطوری؟';
        const CLICK_X = 134;
        const CLICK_Y = 254;
        
        // این متغیر برای دسترسی به مرورگر در بلوک catch است
        let browser = null;

        (async () => {
          try {
            browser = await puppeteer.launch({
              headless: false, // <<< تغییر مهم: اجرای مرورگر به صورت headful
              userDataDir: './user_data',
              executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome',
              args: [
                '--no-sandbox', 
                '--disable-setuid-sandbox',
                '--disable-gpu', // این آرگومان‌ها برای اجرای headful در محیط مجازی اغلب لازم هستند
                '--disable-dev-shm-usage',
                '--disable-web-security',
                '--allow-running-insecure-content',
                '--ignore-certificate-errors',
                '--window-size=1366,768' // تنظیم اندازه پنجره
              ]
            });
            const page = await browser.newPage();
            await page.setViewport({width:1366, height:768});
            
            console.log('Loading chatgpt.com...');
            await page.goto('https://chatgpt.com', {waitUntil: 'networkidle2', timeout: 60000});
            await new Promise(r => setTimeout(r, 5000));
            
            await page.screenshot({path: 'before_click.png'});
            
            console.log('Clicking at (' + CLICK_X + ', ' + CLICK_Y + ')...');
            await page.mouse.click(CLICK_X, CLICK_Y);
            await new Promise(r => setTimeout(r, 5000));
            
            await page.screenshot({path: 'after_click.png'});
            
            console.log('Typing: ' + TEXT_TO_TYPE);
            await page.keyboard.type(TEXT_TO_TYPE, {delay: 100});
            await new Promise(r => setTimeout(r, 3000));
            
            await page.screenshot({path: 'after_type.png'});
            
            console.log('✅ Typing completed!');
            // مرورگر را اینجا نمی‌بندیم تا ffmpeg بتواند ضبط را ادامه دهد
            // await browser.close(); 

          } catch (error) {
            console.error('❌ Error:', error.message);
            // اگر خطایی رخ داد، مرورگر را ببند
            if (browser) await browser.close();
            // اینجا یک خطای خاص برای ffmpeg در نظر گرفته نشده، ولی باید مدیریت شود
            throw error; // خطا را دوباره پرتاب کن تا workflow متوقف شود
          }
        })();
        EOF

    - name: Setup Xvfb and Start FFmpeg for recording
      run: |
        # راه‌اندازی سرور نمایش مجازی Xvfb
        Xvfb :1 -screen 0 1366x768x24 &
        export DISPLAY=:1
        
        # شروع ضبط با ffmpeg - این دستور باید در پس‌زمینه اجرا شود
        # -f x11grab: برای ضبط از نمایشگر X11
        # -video_size 1366x768: اندازه ویدیو
        # -i :1: ضبط از دیسپلی شماره 1
        # -r 30: نرخ فریم 30 فریم در ثانیه
        # -pix_fmt yuv420p: فرمت پیکسل برای سازگاری بیشتر
        # output.mp4: نام فایل خروجی
        ffmpeg -y -f x11grab -video_size 1366x768 -i :1.0+0,0 -r 30 -pix_fmt yuv420p output.mp4 &
        
        # یک وقفه کوتاه برای اطمینان از شروع شدن ffmpeg
        sleep 5

    - name: Run script with xvfb-run and Node.js
      run: xvfb-run --auto-servernum --server-num=1 node type.js

    - name: Stop FFmpeg and save video
      if: success() || failure() # این مرحله همیشه اجرا شود، حتی اگر اسکریپت خطا بدهد
      run: |
        # پیدا کردن PID پروسه ffmpeg و کشتن آن
        # این بخش ممکن است نیاز به تنظیم داشته باشد بسته به محیط GitHub Actions
        killall ffmpeg || echo "ffmpeg process not found or already stopped."
        
        # اطمینان حاصل کنید که فایل output.mp4 وجود دارد
        if [ -f "output.mp4" ]; then
          mv output.mp4 ./video.mp4
          echo "Video saved as video.mp4"
        else
          echo "output.mp4 not found. No video was recorded."
        fi

    - name: Commit & Push Screenshots and Video
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add *.png type.js package*.json video.mp4 || true # اضافه شدن video.mp4
        git rm -r --cached user_data || true
        git commit -m "Type $(date +%Y-%m-%d\ %H:%M:%S) with screenshots and video" || true
        git push origin HEAD:main || true
