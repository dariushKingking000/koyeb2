name: 📸 Screen Capture Bot (با B)
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        rm -rf node_modules package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        (async () => {
          try {
            const instructions = [
              '[click 564 264]',
              '[type  kingking@gmail.com]',
              '[wait 5]',
              '[click 640 330]',
              '[wait 10]',
              '[type pass.txt]',
              '[click 583 492]'
            ];
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
            await new Promise(r=>setTimeout(r,3000));

            const selectors = [
              'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
              'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]',
              'input[type="text"]', 'input[type="email"]', '#email', '#username'
            ];

            let frame = 0;
            await page.screenshot({ path: `frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
            console.log(`📸 Frame ${frame}: Initial load`);
            frame++;

            for(let i=0; i<instructions.length; i++){
              const cmd = instructions[i];
              console.log(`🔄 ${i+1}/${instructions.length}: ${cmd}`);
              
              await page.screenshot({ path: `frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
              console.log(`📸 Frame ${frame}: Before ${cmd}`);
              frame++;
              
              if(cmd.startsWith('[type ')){
                const text = cmd.slice(6, -1).trim();
                
                if(text === 'pass.txt'){
                  console.log('🔍 منتظر اعداد از B...');
                  let passContent = '';
                  let attempts = 0;
                  
                  while(true){
                    try {
                      // 🔑 چک repo برای numbers.txt از B
                      passContent = execSync('git pull origin main --quiet 2>/dev/null || true && cat numbers.txt 2>/dev/null || echo ""', 
                        {encoding: 'utf8', timeout: 15000}).trim();
                      
                      console.log(`📄 numbers.txt: "${passContent}" (${passContent.length} chars)`);
                      
                      if(passContent.length === 6 && /^\d{6}$/.test(passContent)){
                        console.log(`✅ اعداد از B رسید: ${passContent}`);
                        break;
                      }
                    }catch(e){
                      console.log(`⏳ B هنوز نفرستاده... (${++attempts})`);
                    }
                    
                    await new Promise(r=>setTimeout(r, 30000)); // 30s صبر
                  }
                  
                  // تایپ رمز
                  let found = false;
                  for(const selector of selectors){
                    try{
                      await page.waitForSelector(selector, {timeout: 3000});
                      const el = await page.$(selector);
                      if(el){
                        await el.click({force: true});
                        await page.waitForTimeout(500);
                        await page.keyboard.type(passContent, {delay: 150});
                        console.log(`✅ رمز تایپ شد: ${passContent}`);
                        found = true;
                        break;
                      }
                    }catch(e){}
                  }
                  if(!found) await page.keyboard.type(passContent, {delay: 150});
                  
                }else{
                  let found = false;
                  for(const selector of selectors){
                    try{
                      await page.waitForSelector(selector, {timeout: 3000});
                      const el = await page.$(selector);
                      if(el){
                        await el.click({force: true});
                        await page.waitForTimeout(500);
                        await page.keyboard.type(text, {delay: 150});
                        found = true;
                        break;
                      }
                    }catch(e){}
                  }
                  if(!found) await page.keyboard.type(text, {delay: 150});
                }
                
              }else if(cmd.startsWith('[click ')){
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                await page.mouse.click(x, y);
                console.log(`🖱️ Clicked (${x},${y})`);
                
              }else if(cmd.startsWith('[wait ')){
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ Wait ${s}s`);
                await new Promise(r=>setTimeout(r, s*1000));
              }
              
              await page.screenshot({ path: `frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
              console.log(`📸 Frame ${frame}: After ${cmd}`);
              frame++;
            }
            
            await new Promise(r=>setTimeout(r, 3000));
            await page.screenshot({ path: `frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
            console.log(`✅ Total: ${frame} frames - اعداد از B OK!`);
            await browser.close();
          }catch(e){
            console.error('❌ Error:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Capture Screenshots
      run: |
        rm -rf *.png numbers.txt
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 3
        node capture.cjs
        pkill Xvfb || true
        
        echo "📊 Frames:"
        ls -la *.png | head -20
        echo "📸 Total: $(ls *.png 2>/dev/null | wc -l)"
    
    - name: Create ZIP
      run: |
        zip -r screenshots.zip *.png numbers.txt 2>/dev/null || true
    
    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 📸-screenshots-with-numbers
        path: |
          screenshots.zip
          *.png
        retention-days: 30
    
    - name: Commit Results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add *.png screenshots.zip || true
        if ! git diff --staged --quiet; then
          git commit -m "📸 $(ls *.png 2>/dev/null | wc -l | xargs) frames [skip ci]"
          git push
        fi
        echo "✅ تمام!"
