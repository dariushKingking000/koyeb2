name: Click Coordinates
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # ⬆️ افزایش
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    
    - name: Install & Click
      run: |
        npm init -y
        npm i puppeteer@latest
        npx puppeteer browsers install chrome
        
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const config = {
          url: 'https://chatgpt.com',
          x: 134,
          y: 254,
          timestamp: new Date().toISOString()
        };
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          console.log('🚀 Launching browser...');
          
          const browser = await puppeteer.launch({
            headless: true,
            args: [
              '--no-sandbox',
              '--disable-setuid-sandbox',
              '--disable-dev-shm-usage',
              '--disable-gpu',
              '--disable-web-security',
              '--disable-features=VizDisplayCompositor'
            ],
            timeout: 30000
          });
          
          const page = await browser.newPage();
          await page.setViewport({width: 1920, height: 1080});
          
          console.log(`🌐 Navigating to ${config.url}...`)$;
          $await page.goto(config.url, {$ 
            waitUntil: 'domcontentloaded',  // ✅ سریع‌تر
            timeout: 60000 
          });
          
          // 📸 قبل
          $await page.screenshot({path: 'before-click.png', fullPage: true})$;
          $console.log('📸 Screenshot before')$;
          
          // 🖱️ کلیک
          $await page.mouse.click(config.x, config.y)$;
          $await page.waitForTimeout(1000);  //$ صبر 1s
          
          // 🔴 دایره
          $await page.evaluate((x, y) => {$
            $const circle = document.createElement('div')$;
            $circle.style.cssText = `$
              position:fixed;left:{x-2}px;top:${y-2}px$;
              width:4px;height:4px;background:red;
              border-radius:50%;border:1px solid white;
              pointer-events:none;z-index:99999;
            `;
            $document.body.appendChild(circle)$;
          $}, config.x, config.y)$;
          
          $console.log(`✅ Clicked at (${config.x}, ${config.y})`);
          
          // 📸 بعد
          await page.screenshot({path: 'after-click.png', fullPage: true});
          console.log('📸 Screenshot after');
          
          await browser.close();
          console.log('🏁 Done!');
        })().catch(e => {
          console.error('❌ Error:', e.message);
          console.error('Stack:', e.stack);
          process.exit(1);
        });
        EOF
        
        node click.js
    
    - name: Commit Results
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add *.png config.json click.js
        git commit -m "🎯 Click (134,254) [skip ci]" || echo "No changes"
        git push || echo "Push skipped"
