name: Create TXT
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - run: python apper.py
    - run: |
        git config user.name "GitHub"
        git config user.email "action@github.com"
        git add google_results.txt
        git commit -m "Add results" || exit 0
        git push
