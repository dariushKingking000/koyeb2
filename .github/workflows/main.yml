name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup Node & Puppeteer
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install packages
      run: |
        rm -f package.json package-lock.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Setup
      run: mkdir -p record
    
    - name: Create record.cjs
      run: |
        cat > record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        (async () => {
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور\n🎥 شروع...`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            
            await new Promise(resolve => setTimeout(resolve, 4000));
            console.log('🌐 صفحه لود شد');

            const selectors = [
              'div[contenteditable]', 'textarea', '[contenteditable="true"]', 
              '[data-id="root"] textarea', '.ProseMirror', 'prompt-textarea', '[role="textbox"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`🔄 #${i + 1}/${instructions.length}: ${cmd}`);
              
              if (cmd.startsWith('[type ')) {
                const text = cmd.slice(6, -1);
                console.log('⌨️ تایپ...');
                
                let found = false;
                for (const selector of selectors) {
                  try {
                    await page.waitForSelector(selector, { timeout: 1000 });
                    await page.click(selector);
                    await page.keyboard.type(text, { delay: 50 });
                    await page.keyboard.press('Enter');
                    console.log(`✅ "${text}" تایپ شد`);
                    found = true;
                    break;
                  } catch(e) {
                    // ساکت رد شو
                  }
                }
                
                if (!found) {
                  console.log('⚠️ input نبود → مستقیم تایپ');
                  await page.keyboard.type(text, { delay: 50 });
                  await page.keyboard.press('Enter');
                  console.log(`✅ "${text}" مستقیم`);
                }
                
              } else if (cmd.startsWith('[click ')) {
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                console.log(`🖱️ کلیک: (${x}, ${y})`);
                await page.mouse.click(x, y).catch(() => {});
                
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ ${s}s...`);
                await new Promise(resolve => setTimeout(resolve, s * 1000));
              }
            }
            
            console.log('🏁 4 ثانیه نهایی...');
            await new Promise(resolve => setTimeout(resolve, 4000));
            await browser.close();
            console.log('✅ تمام!');
          } catch (e) {
            console.error('❌ خطا:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Execute with Xvfb & FFmpeg
      run: |
        Xvfb :99 -screen 0 1366x768x24 -ac +extension GLX +render -noreset &>/dev/null &
        XVFB_PID=$!
        export DISPLAY=:99
        sleep 3
        
        ffmpeg -nostdin -loglevel error -f x11grab -show_region 0 -draw_mouse 0 \
               -s 1366x768 -r 30 -i :99.0 -t 120 -c:v libx264 -pix_fmt yuv420p \
               -crf 23 -preset ultrafast -y ./record/demo_full.mp4 &>/dev/null &
        
        FFMPEG_PID=$!
        sleep 2
        
        node record.cjs || true
        
        echo "🛑 Kill..."
        kill -9 $FFMPEG_PID $XVFB_PID 2>/dev/null || true
        pkill -9 -f ffmpeg || true
        pkill -9 -f x11grab || true
        pkill -9 -f Xvfb || true
        sleep 2
        
        mkdir -p record
        cp instructions.txt record/ 2>/dev/null || true
        mv *.mp4 record/ 2>/dev/null || true
        mv record.cjs record/ 2>/dev/null || true
        mv package*.json record/ 2>/dev/null || true
        
        ls -la record/
        du -sh record/*
    
    - uses: actions/upload-artifact@v4
      with:
        name: 🎥-complete
        path: record/
