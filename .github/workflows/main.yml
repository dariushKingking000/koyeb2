name: Anti-Cloudflare Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # افزایش timeout
    steps:
    - uses: actions/checkout@v4
    
    - uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: stable
    
    - name: Install Dependencies
      run: |
        npm init -y
        npm i puppeteer@latest puppeteer-extra puppeteer-extra-plugin-stealth@latest
        
    - name: Stealth Click
      run: node click.js
      env:
        PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: true
    
    - name: Commit Results
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add *.png *.json click.js package*.json
        git commit -m "🎯 Click Results [skip ci]" || true
        git push || true
