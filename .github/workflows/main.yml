name: Stealth Click
on: [push]
permissions: { contents: write }

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - run: |
        npm init -y
        npm i puppeteer@latest puppeteer-extra@latest puppeteer-extra-plugin-stealth@latest
    - run: |
        echo 'const puppeteer = require("puppeteer");(async()=>{const b=await puppeteer.launch({headless:true,args:["--no-sandbox"]});const p=await b.newPage();await p.setViewport({width:1366,height:768});await p.goto("https://chatgpt.com",{timeout:6e4});await new Promise(r=>setTimeout(r,5e3));await p.screenshot({path:"before.png"});await p.mouse.click(134,254);await new Promise(r=>setTimeout(r,3e3));await p.screenshot({path:"after.png"});await b.close();console.log("✅");})().catch(console.error);' > click.js
      shell: bash
    - run: node click.js
    - uses: EndBug/add-and-commit@v9
      with:
        add: '*.png'
        message: '🎯 Click Results'
