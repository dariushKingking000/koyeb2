name: Create TXT File
on: [push]
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: 3.x
    - run: pip install requests  # optional
    - run: python apper.py
    - name: Show file
      run: cat google_results.txt
    - uses: actions/upload-artifact@v4
      with:
        name: google-results
        path: google_results.txt
