name: 🎥 Screen Record Bot
on: [workflow_dispatch]
jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 🟢 Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: 🔧 Install
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg
        npm init -y
        npm install puppeteer
        
    - name: 📁 Setup
      run: mkdir -p record user_data
      
    - name: 🎬 record.js
      run: |
        cat > record.js << 'EOF'
        [کد JS بدون تغییر]
        EOF
        
    - name: 🎥 Execute
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1366x768x24 &
        sleep 2
        node record.js
        
    - name: 📤 Upload
      uses: actions/upload-artifact@v4
      with:
        name: 🎥-complete
        path: |
          record/
          instructions.txt
