name: 🎥 Screen Record Bot
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update
        sudo apt install -y xvfb ffmpeg
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install Puppeteer
      run: |
        npm init -y
        npm install puppeteer
    
    - name: Setup record dir
      run: mkdir -p record
    
