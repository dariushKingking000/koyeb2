name: Stealth Click
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      id: chrome
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install
      run: |
        npm init -y
        npm i puppeteer@latest puppeteer-extra@latest puppeteer-extra-plugin-stealth@latest
        
    - name: Create Script
      run: |
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer-extra');
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());
        (async () => {
          const chromePath = '/opt/hostedtoolcache/chromium/latest/x64/chrome';
          console.log('🚀 Chrome:', chromePath);
          const browser = await puppeteer.launch({
            headless: true,
            executablePath: chromePath,
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          const page = await browser.newPage();
          await page.setViewport({width: 1366, height: 768});
          await page.goto('https://chatgpt.com', {timeout: 60000});
          await page.waitForTimeout(3000);
          await page.screenshot({path: 'before.png'});
          await page.mouse.click(134, 254);
          await page.evaluate(() => {
            const c = document.createElement('div');
            c.style.cssText = 'position:fixed;left:124px;top:244px;width:20px;height:20px;background:red;border-radius:50%;box-shadow:0 0 15px red;z-index:99999';
            document.body.append(c);
          });
          await page.waitForTimeout(3000);
          await page.screenshot({path: 'after.png'});
          await browser.close();
          console.log('✅ SUCCESS');
        })();
        EOF
        
    - name: Run Click
      run: node click.js
      
    - name: Commit
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add *.png *.js package* || true
        git commit -m "Click $(date)" || true$
        git push https://x-access-token:{{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main || true
        
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: screenshots
        path: '*.png'
