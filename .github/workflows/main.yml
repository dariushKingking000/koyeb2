# ✅ این را جایگزین کنید
- name: Create record.cjs v2 ✅ FIXED
  run: |
    cat > record.cjs << 'EOF
const puppeteer = require('puppeteer');
const fs = require('fs/promises');

(async () => {
  try {
    const data = await fs.readFile('./record/instructions.txt', 'utf8');
    const instructions = data.split('\n').map(l => l.trim()).filter(Boolean);
    
    console.log(`📋 ${instructions.length} instructions loaded`);
    
    const browser = await puppeteer.launch({
      headless: false,
      args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
    });
    
    const page = await browser.newPage();
    await page.setViewport({ width: 1366, height: 768 });
    await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
    
    await new Promise(r => setTimeout(r, 5000));
    console.log('🌐 ChatGPT loaded successfully');

    const inputSelectors = ['textarea', '[contenteditable="true"]', '[role="textbox"]'];

    for (let i = 0; i < instructions.length; i++) {
      const cmd = instructions[i];
      if (!cmd.startsWith('[') || !cmd.endsWith(']')) continue;
      
      console.log(`🔄 ${i+1}/${instructions.length}: ${cmd}`);
      
      if (cmd.startsWith('[type ')) {
        const text = cmd.slice(6, -1);
        let typed = false;
        
        for (const selector of inputSelectors) {
          try {
            await page.waitForSelector(selector, { timeout: 3000 });
            await page.click(selector);
            await page.keyboard.type(text, { delay: 50 });
            console.log(`✅ Typed: "${text}"`);
            typed = true;
            break;
          } catch (e) {
            console.log(`Selector failed: ${selector}`);
          }
        }
        
        if (!typed) {
          console.log('⚠️ No input found, pressing Enter');
          await page.keyboard.press('Enter');
        }
        
      } else if (cmd.startsWith('[click ')) {
        const coords = cmd.slice(7, -1).split(' ').map(Number);
        await page.mouse.click(coords[0], coords[1]);
        console.log(`🖱️ Clicked (${coords[0]}, ${coords[1]})`);
        
      } else if (cmd.startsWith('[wait ')) {
        const seconds = parseInt(cmd.slice(6, -1));
        await new Promise(resolve => setTimeout(resolve, seconds * 1000));
        console.log(`⏳ Waited ${seconds}s`);
      }
    }
    
    console.log('🎬 Final wait 10s...');
    await new Promise(r => setTimeout(r, 10000));
    await browser.close();
    console.log('✅ SUCCESS - Browser closed');
    
  } catch (error) {
    console.error('💥 FATAL ERROR:', error.message);
    process.exit(1);
  }
})();
EOF

# تست syntax قبل از اجرا
echo "=== TESTING SYNTAX ==="
node -c record.cjs && echo "✅ SYNTAX OK" || echo "❌ SYNTAX ERROR"
echo "=== FIRST 10 LINES ==="
head -10 record.cjs
EOF
