name: Click & Screenshot
on: [push]
permissions:
  contents: write

jobs:
  clicker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome 126
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: '126.0.6478.126'
    
    - name: Click & Screenshot
      run: |
        npm init -y
        npm i puppeteer@22.6.1
        
        cat > clicker.js << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        const config = {
          url: 'https://chatgpt.com',
          clickX: 831,
          clickY: 589,
          width: 1920,
          height: 1080,
          chromeVersion: '126.0.6478.126',
          timestamp: new Date().toISOString()
        };
        
        fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
        
        (async () => {
          console.log('🚀 Chrome launching...');
          const browser = await puppeteer.launch({
            headless: true,
            executablePath: process.env.CHROME_BIN,
            args: ['--no-sandbox','--disable-setuid-sandbox','--disable-gpu']
          });
          
          const page = await browser.newPage();
          await page.setViewport({width: config.width, height: config.height});
          
          // قبل کلیک
          console.log('🌐 Loading ChatGPT...');
          await page.goto(config.url, {waitUntil: 'networkidle2', timeout: 30000});
          await page.screenshot({path: 'before.png', fullPage: true});
          console.log('📸 before.png saved');
          
          // کلیک دقیق
          console.log(`🖱️ Clicking ${config.clickX},${config.clickY}`);
          await page.mouse.click(config.clickX, config.clickY);
          await page.waitForTimeout(5000); // صبر 5 ثانیه
          
          // بعد کلیک
          await page.screenshot({path: 'after.png', fullPage: true});
          console.log('📸 after.png saved');
          
          await browser.close();
          console.log('✅ Complete!');
        })().catch(e => console.error('❌', e.message));
        EOF
        
        node clicker.js
    
    - name: Commit Results
      run: |
        git config user.name "ClickBot"
        git config user.email "actions@github.com"
        ls -la *.png config.json
        git add *.png config.json || true
        git commit -m "🎯 Clicked 831,589 | $(date)" || true
        git push || true
