name: Click Ultra Fast
on: [push]
permissions:
  contents: write

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install & Click
      run: |
        npm init -y
        npm i puppeteer@latest
        
        cat > click.js << 'EOF'
        const puppeteer = require('puppeteer');
        (async () => {
          console.log("🚀 Launching browser...");
          const browser = await puppeteer.launch({
            headless: true,
            args: [
              "--no-sandbox",
              "--disable-setuid-sandbox",
              "--disable-dev-shm-usage",
              "--disable-gpu",
              "--single-process"
            ]
          });
          
          const page = await browser.newPage();
          await page.setViewport({width:1920, height:1080});
          
          console.log("🌐 Going to chatgpt.com...");
          await page.goto("https://chatgpt.com", {timeout: 60000});
          
          await page.screenshot({path: "before.png"});
          console.log("📸 Before screenshot OK");
          
          await page.mouse.click(831, 589);
          console.log("🖱️ Clicked!");
          
          await page.waitForTimeout(3000);
          await page.screenshot({path: "after.png"});
          console.log("📸 After screenshot OK");
          
          await browser.close();
          console.log("✅ Complete!");
        })().catch(e => {
          console.error("❌", e.message);
          process.exit(1);
        });
        EOF
        
        node click.js
    
    - name: Commit
      if: always()
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        ls -la || true
        git add . || true
        git commit -m "🎯 Click $(date)" || true
        git push || true
