name: 🎬 Stealth Typing + Video (100% Working)

on:
  push:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🎨 Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb ffmpeg xdotool wmctrl

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # استفاده از اکشن مرورگر برای اطمینان از نصب کروم و دسترسی به آن
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.1.0

      - name: Install npm packages
        run: |
          npm init -y
          npm i puppeteer-core@22 puppeteer-extra@3.3.6 puppeteer-extra-plugin-stealth@2.11.2

      - name: 📱 Create Script
        run: |
          cat > type.js <<'SCRIPT'
          const puppeteer = require('puppeteer-extra');
          const StealthPlugin = require('puppeteer-extra-plugin-stealth');
          puppeteer.use(StealthPlugin());

          (async () => {
            console.log('🚀 Starting...');

            // این قسمت را حذف می‌کنیم تا Puppeteer خودش مرورگر را پیدا کند.
            // اگر باز هم خطا داد، باید مسیر کروم نصب شده توسط browser-actions/setup-chrome@v1.1.0 را پیدا کنیم.
            const browser = await puppeteer.launch({
              headless: true, // تغییر به headless: true چون در محیط سرور گرافیک نداریم
              // executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome', // این خط حذف یا کامنت می‌شود
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-gpu',
                '--disable-dev-shm-usage',
                '--disable-web-security',
                '--ignore-certificate-errors',
                // '--window-size=1366,768' // حذف این خط در حالت headless
              ]
            });

            const page = await browser.newPage();
            // در حالت headless، سایز ویوپورت مهم است
            await page.setViewport({ width: 1366, height: 768 });

            console.log('🌐 Loading chatgpt.com...');
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle2' });
            await page.waitForTimeout(5000);

            await page.screenshot({ path: '1_before.png' });

            console.log('🖱️ Clicking input...');
            // مختصات کلیک ممکن است در headless متفاوت باشد. اگر کار نکرد، باید selector پیدا کنیم.
            await page.mouse.click(134, 254);
            await page.waitForTimeout(2000);

            await page.screenshot({ path: '2_clicked.png' });

            console.log('⌨️ Typing: سلام! چطوری؟');
            await page.keyboard.type('سلام! چطوری؟', { delay: 120 });
            await page.waitForTimeout(3000);

            await page.screenshot({ path: '3_typed.png' });

            console.log('✅ Complete!');
            await browser.close();
          })();
          SCRIPT

      - name: 🎥 Setup Virtual Display & Record Video
        run: |
          # Xvfb را فقط برای ضبط ویدیو اجرا می‌کنیم، نه برای اجرای کروم headless
          Xvfb :99 -screen 0 1366x768x24 > /dev/null 2>&1 &
          export DISPLAY=:99
          sleep 2

          # FFmpeg را با تنظیمات بهینه شروع می‌کنیم
          ffmpeg -y -f x11grab -video_size 1366x768 -i :99.0+0,0 \
            -r 20 -pix_fmt yuv420p -crf 18 -preset fast \
            -t 45 video.mp4 > /dev/null 2>&1 &
          FFMPEG_PID=$!

          # اجرای اسکریپت Node.js
          node type.js

          # منتظر اتمام و سپس بستن FFmpeg
          sleep 5
          kill $FFMPEG_PID 2>/dev/null || true
          wait $FFMPEG_PID 2>/dev/null || true

          # نمایش فایل‌های تولید شده
          ls -la *.png video.mp4 2>/dev/null | cat

          # فشرده‌سازی ویدیو در صورت نیاز
          if [ -f video.mp4 ] && [ $(stat -c%s video.mp4) -gt 50000000 ]; then
            ffmpeg -y -i video.mp4 -vcodec libx264 -crf 28 -preset fast video_small.mp4
            mv video_small.mp4 video.mp4
          fi

      - name: 📤 Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typing-results
          path: |
            *.png
            video.mp4
            type.js

      - name: 💾 Commit & Push
        run: |
          git config user.name "🤖 GitHub Actions Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f *.png video.mp4 type.js package*.json 2>/dev/null || true
          git rm -rf user_data 2>/dev/null || true

          git commit -m "🎬 Typing Demo: $(date '+%Y-%m-%d %H:%M')" || true
          git push origin HEAD:main || true

      - name: 🔍 Show Results
        if: always()
        run: |
          echo "=== FILES ==="
          ls -la *.png video.* 2>/dev/null | cat || echo "No files"
          echo "=== Video Info ==="
          [ -f video.mp4 ] && ffmpeg -i video.mp4 2>&1 | head -20 || echo "No video"
