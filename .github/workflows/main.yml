name: Stealth Type
on: [push]
permissions:
  contents: write

jobs:
  type:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: browser-actions/setup-chrome@v1.1.0
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Install
      run: |
        sudo apt-get install -y xvfb ffmpeg
        npm init -y
        npm i puppeteer-core puppeteer-extra puppeteer-extra-plugin-stealth
    - name: Create script
      run: |
        cat > type.js << 'EOF'
const puppeteer = require('puppeteer-extra');
const StealthPlugin = require('puppeteer-extra-plugin-stealth');
puppeteer.use(StealthPlugin());
(async()=>{const b=await puppeteer.launch({headless:false,executablePath:'/opt/hostedtoolcache/chromium/latest/x64/chrome',args:['--no-sandbox','--disable-setuid-sandbox','--disable-gpu','--window-size=1366,768']});const p=await b.newPage();await p.setViewport({width:1366,height:768});await p.goto('https://chatgpt.com',{waitUntil:'networkidle2'});await p.waitForTimeout(5000);await p.screenshot({path:'1.png'});await p.mouse.click(134,254);await p.waitForTimeout(3000);await p.screenshot({path:'2.png'});await p.keyboard.type('سلام! چطوری؟',{delay:100});await p.waitForTimeout(3000);await p.screenshot({path:'3.png'});await b.close();})();
EOF
    - name: Run
      run: xvfb-run node type.js
    - name: Commit
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add *.png type.js || true
        git commit -m "Type done" || true
        git push || true
