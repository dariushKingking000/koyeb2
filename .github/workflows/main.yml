name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        mkdir -p record
        rm -rf node_modules package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create record.cjs
      run: |
        cat > record/record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        (async () => {
          try {
            const instructions = [
              '[wait 3]',
              '[type چطوری؟]',
              '[wait 2]',
              '[click 134 432]',
              '[type سلام! خوبم]',
              '[wait 3]',
              '[click 200 300]',
              '[type شاهکار بود]',
              '[wait 5]'
            ];
            console.log(`📋 ${instructions.length} instructions loaded`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await new Promise(r=>setTimeout(r,5000));
            console.log('🌐 ChatGPT loaded');

            const selectors = [
              'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
              'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]'
            ];

            for(let i=0; i<instructions.length; i++){
              const cmd = instructions[i];
              console.log(`🔄 ${i+1}/9: ${cmd}`);
              
              if(cmd.startsWith('[type ')){
                let found = false;
                for(const selector of selectors){
                  try{
                    await page.waitForSelector(selector, {timeout: 5000});
                    const el = await page.$(selector);
                    await el.click({force: true});
                    const text = cmd.slice(6, -1);
                    await page.keyboard.type(text, {delay: 100});
                    console.log(`✅ Typed: "${text}"`);
                    found = true;
                    break;
                  }catch(e){
                    console.log(`❌ Selector failed: ${selector}`);
                  }
                }
                if(!found){
                  console.log('⚠️ No input found, pressing Enter');
                  await page.keyboard.press('Enter');
                }
              }else if(cmd.startsWith('[click ')){
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                await page.mouse.click(x, y);
                console.log(`🖱️ Clicked (${x}, ${y})`);
              }else if(cmd.startsWith('[wait ')){
                const s = parseInt(cmd.slice(6, -1));
                await new Promise(r=>setTimeout(r, s*1000));
                console.log(`⏳ Waited ${s}s`);
              }
            }
            
            console.log('🎬 Final wait & close...');
            await new Promise(r=>setTimeout(r, 8000));
            await browser.close();
            console.log('✅ Automation Complete!');
          }catch(e){
            console.error('❌ Error:', e.message);
          }
        })();
        JS_EOF
    
    - name: Record Screen
      run: |
        rm -f record/*.mp4
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 5
        
        timeout 240s ffmpeg -f x11grab -s 1366x768 -r 30 -i :99.0 \
          -t 120 -c:v libx264 -pix_fmt yuv420p -crf 23 -preset ultrafast \
          -movflags +faststart -f mp4 ./record/demo_full.mp4 &
        
        FFMPEG_PID=$!
        sleep 5
        node record/record.cjs
        sleep 10
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        sleep 5
        
        # ✅ تعمیر MP4
        if [ -f ./record/demo_full.mp4 ]; then
          ffmpeg -y -i ./record/demo_full.mp4 -c copy -movflags +faststart ./record/demo_fixed.mp4
          mv ./record/demo_fixed.mp4 ./record/demo_full.mp4
          echo "✅ MP4 repaired!"
        fi
        
        ls -la record/
        du -sh record/*.mp4
    
    - name: Upload Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 🎥-ChatGPT-Demo
        path: record/
        retention-days: 30
    
    - name: Commit & Push Video
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add record/*.mp4 || echo "No video to commit"
        if git diff --staged --quiet; then
          echo "✅ No changes - video ready in artifacts"
        else
          git commit -m "🎥 Add ChatGPT demo video [skip ci]"
          git push
          echo "✅ Video pushed to repo!"
        fi
