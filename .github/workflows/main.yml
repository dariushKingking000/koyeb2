name: Fast Clicker
on: [push]
permissions:
  contents: write

jobs:
  fastclick:
    runs-on: ubuntu-22.04  # سریعتر از ubuntu-latest
    timeout-minutes: 8
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Ultra Fast Click
      run: |
        npm i puppeteer@22.6.1 -g --silent
        cat > click.js << 'EOF'
        const puppeteer=require('puppeteer');(async()=>{const b=await puppeteer.launch({headless:!0,args:['--no-sandbox','--disable-setuid-sandbox','--disable-gpu','--single-process','--no-zygote','--disable-extensions']}),p=await b.newPage();await p.setViewport({width:1920,height:1080});await p.goto('https://chatgpt.com',{waitUntil:'domcontentloaded',timeout:15000});await p.screenshot({path:'before.png'});await p.mouse.click(831,589);await p.waitForTimeout(2e3);await p.screenshot({path:'after.png'});await b.close();})();
        EOF
        time node click.js
    
    - name: Commit
      run: |
        git config user.name ClickBot
        git config user.email actions@github.com
        git add *.png || exit 0
        git commit -m FastClick || exit 0
        git push || exit 0
