name: Google سلام Screenshot
on: [push, pull_request]

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Playwright
      run: npm init -y && npm i -D @playwright/test@latest && npx playwright install --with-deps
    
    - name: Google "سلام" + Screenshot
      run: |
        cat > screenshot.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({ headless: false });
          const page = await browser.newPage();
          await page.setViewportSize({ width: 1920, height: 1080 });
          
          console.log('🌐 Google...');
          await page.goto('https://www.google.com');
          
          console.log('🔍 تایپ سلام...');
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          
          console.log('⏳ منتظر نتایج...');
          await page.waitForLoadState('networkidle');
          
          console.log('📸 اسکرین‌شات...');
          await page.screenshot({ 
            path: 'google-salams-full.png', 
            fullPage: true 
          });
          
          await browser.close();
          console.log('✅ google-salams-full.png ذخیره شد!');
        })();
        EOF
        
        node screenshot.js
    
    - name: Commit screenshot to repo
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add google-salams-full.png
        git commit -m "اسکرین‌شات سرچ سلام" || echo "No changes"
        git push
