name: Google Screenshot Fixed
on: [push, pull_request]

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Playwright
      run: npm init -y && npm i -D @playwright/test@latest && npx playwright install --with-deps
    
    - name: Screenshot Google "سلام"
      run: |
        npx playwright run --no-deps << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({ 
            headless: true,
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          const context = await browser.newContext({
            viewport: { width: 1920, height: 1080 }
          });
          const page = await context.newPage();
          
          await page.goto('https://www.google.com', { 
            waitUntil: 'networkidle',
            timeout: 30000 
          });
          
          await page.fill('textarea[name="q"]', 'سلام', { timeout: 10000 });
          await page.press('textarea[name="q"]', 'Enter');
          
          await page.waitForSelector('.g', { timeout: 15000 });
          
          await page.screenshot({ 
            path: 'google-salams.png', 
            fullPage: true 
          });
          
          await browser.close();
          console.log('✅ google-salams.png OK!');
        })();
        EOF
    
    - name: Commit image
      run: |
        ls -la google-salams.png
        git config user.name "Actions"
        git config user.email "actions@github.com"
        git add google-salams.png
        git commit -m "Google سلام screenshot" || echo "No image"
        git push
