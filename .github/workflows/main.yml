name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup Node & Puppeteer
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install packages
      run: |
        rm -f package.json package-lock.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Setup
      run: mkdir -p record
    
    - name: Create record.cjs
      run: |
        cat > record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        (async () => {
          const TIMEOUT = 20000; // 20s
          const POLL_INTERVAL = 500; // 0.5s
          
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور\n🎥 شروع...`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu', '--disable-web-security']
            });
            
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0', timeout: 30000 });
            
            await new Promise(r => setTimeout(r, 4000));
            console.log('🌐 صفحه لود شد');

            const selectors = [
              'div[contenteditable]', 'textarea', '[contenteditable="true"]', 
              '[data-id="root"] textarea', '.ProseMirror', 'prompt-textarea', 
              '[role="textbox"]', 'textarea[placeholder*="message"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`🔄 #${i + 1}/${instructions.length}: ${cmd}`);
              const cmdStart = Date.now();
              
              if (cmd.startsWith('[type ')) {
                const text = cmd.slice(6, -1);
                console.log('⌨️ تایپ شروع...');
                
                let success = false;
                const typeStart = Date.now();
                
                while (Date.now() - typeStart < TIMEOUT) {
                  try {
                    // اول input رو پیدا کن
                    const input = await page.waitForSelector(selectors.join(','), { timeout: 2000 });
                    await input.click();
                    await page.keyboard.type(text, { delay: 30 });
                    await page.keyboard.press('Enter');
                    console.log(`✅ "${text}" تایپ شد (${(Date.now()-typeStart)/1000}s)`);
                    success = true;
                    break;
                  } catch(e) {
                    await new Promise(r => setTimeout(r, POLL_INTERVAL));
                  }
                }
                
                if (!success) {
                  console.log('⚠️ تایپ timeout → مستقیم');
                  await page.keyboard.type(text, { delay: 30 });
                  await page.keyboard.press('Enter');
                  console.log(`✅ "${text}" مستقیم تایپ`);
                }
                
              } else if (cmd.startsWith('[click ')) {
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                console.log(`🖱️ کلیک: (${x}, ${y})`);
                
                let clickSuccess = false;
                const clickStart = Date.now();
                
                while (Date.now() - clickStart < TIMEOUT) {
                  try {
                    await page.mouse.click(x, y);
                    console.log(`✅ کلیک (${x},${y}) (${(Date.now()-clickStart)/1000}s)`);
                    clickSuccess = true;
                    break;
                  } catch(e) {
                    await new Promise(r => setTimeout(r, POLL_INTERVAL));
                  }
                }
                
                if (!clickSuccess) {
                  console.log('⚠️ کلیک timeout → رد شد');
                }
                
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ ${s}s انتظار...`);
                await new Promise(r => setTimeout(r, s * 1000));
              }
              
              // 20s timeout check
              if (Date.now() - cmdStart > TIMEOUT) {
                console.log('⏰ 20s تمام → بعدی!');
              }
              
              // 1s break بین دستورها
              await new Promise(r => setTimeout(r, 1000));
            }
            
            console.log('🏁 5s نهایی...');
            await new Promise(r => setTimeout(r, 5000));
            await browser.close();
            console.log('✅ تمام شد!');
            
          } catch (e) {
            console.error('❌ خطا:', e.message);
            await browser?.close();
          }
        })();
        JS_EOF
    
    - name: Execute with Xvfb & FFmpeg
      run: |
        Xvfb :99 -screen 0 1366x768x24 -ac +extension GLX +render -noreset &>/dev/null &
        export DISPLAY=:99
        sleep 3
        
        ffmpeg -nostdin -loglevel error -f x11grab -draw_mouse 1 \
               -s 1366x768 -r 30 -i :99.0 -t 180 -c:v libx264 -pix_fmt yuv420p \
               -crf 23 -preset fast -y demo.mp4 &
        
        FFMPEG_PID=$!
        sleep 2
        
        timeout 150s node record.cjs || true
        
        kill -9 $FFMPEG_PID 2>/dev/null || true
        pkill -9 -f ffmpeg || true
        pkill -9 -f Xvfb || true
        sleep 3
        
        mkdir -p record
        cp instructions.txt record/ 2>/dev/null || true
        mv demo.mp4 record/demo_full.mp4 2>/dev/null || true
        mv record.cjs record/ 2>/dev/null || true
        mv package*.json record/ 2>/dev/null || true
        
        ls -la record/
        du -sh record/*
    
    - uses: actions/upload-artifact@v4
      with:
        name: 🎥-complete
        path: record/
