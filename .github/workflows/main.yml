name: 📸 Screen Capture Bot (A)
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg git zip unzip x11-xkb-utils
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        npm init -y
        npm install puppeteer@latest
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        async function continuousCapture(page, prefix, durationMs = 5000) {
          mkdirSync('screenshots', { recursive: true });
          const startTime = Date.now();
          let frameNum = 1;
          
          console.log(`📸 شروع ${prefix} (${durationMs/1000}s)`);
          
          while(Date.now() - startTime < durationMs) {
            await page.screenshot({ 
              path: `screenshots/${prefix}_f${frameNum}.png`, 
              fullPage: false 
            });
            console.log(`📸 ${prefix}_f${frameNum}.png`);
            frameNum++;
            await new Promise(r => setTimeout(r, 1000));
          }
          console.log(`✅ ${prefix} تمام (${frameNum-1} frame)\n`);
        }
        
        function mkdirSync(dir, opts) {
          try { fs.mkdirSync(dir, opts); } catch(e) {}
        }
        
        (async () => {
          console.log('🚀 Screen Capture Bot شروع شد\n');
          
          const browser = await puppeteer.launch({
            headless: false,
            args: [
              '--no-sandbox', 
              '--disable-dev-shm-usage',
              '--disable-gpu',
              '--disable-background-timer-throttling',
              '--disable-backgrounding-occluded-windows',
              '--disable-renderer-backgrounding'
            ]
          });
          const page = await browser.newPage();
          await page.setViewport({ width: 1366, height: 768 });
          await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
          console.log('✅ صفحه n8n لود شد\n');
          
          let actionCount = 0;
          const instructions = [
            '[click 564 264]',
            '[type kingking@gmail.com]',
            '[click 640 330]',
            '[wait 5]',
            '[click 537 397]'
            '[wait 2]'
            '[type 234568]',
            '[click 583 492]'
          ];
          
          // Capture اولیه
          await continuousCapture(page, `start_0_initial`, 5000);
          actionCount++;
          
          for(let action of instructions) {
            console.log(`🔄 STEP ${actionCount}: ${action}`);
            
            // قبل از action
            await continuousCapture(page, `${actionCount}_before_${action.replace(/[\[\] ]/g,'')}`, 5000);
            
            // اجرای action  
            if(action.includes('click 564 264')) {
              await page.mouse.click(564, 264);
              console.log('🖱️ Email field کلیک شد');
            } else if(action.includes('type kingking@gmail.com')) {
              await page.keyboard.type('kingking@gmail.com', {delay: 150});
              console.log('✅ ایمیل تایپ شد');
            } else if(action.includes('click 640 330')) {
              await page.mouse.click(640, 330);
              console.log('🖱️ Password field کلیک شد');
            } else if(action.includes('wait 10')) {
              await new Promise(r => setTimeout(r, 10000));
              console.log('⏳ 10 ثانیه صبر');
            } else if(action.includes('type 234568')) {
              console.log('🔍 منتظر OTP...');
              let otp = '';
              let attempts = 0;
              
              while(attempts < 30) {
                console.log(`⏳ تلاش ${attempts + 1}/30`);
                try {
                  execSync('git fetch origin main && git reset --hard origin/main', {timeout: 30000});
                  if(fs.existsSync('numbers.txt')) {
                    otp = fs.readFileSync('numbers.txt', 'utf8').trim();
                    console.log(`📄 OTP: ${otp}`);
                    if(otp.length === 6 && /^\d{6}$/.test(otp)) break;
                  }
                } catch(e) {}
                attempts++;
                await new Promise(r => setTimeout(r, 30000));
              }
              
              if(otp) {
                for(let char of otp) {
                  await page.keyboard.type(char, {delay: 300});
                }
                console.log(`✅ OTP ${otp} تایپ شد`);
              } else {
                throw new Error('❌ OTP پیدا نشد');
              }
            } else if(action.includes('click 583 492')) {
              await page.mouse.click(583, 492);
              console.log('🖱️ Submit کلیک شد');
            }
            
            // بعد از action
            await continuousCapture(page, `${actionCount}_after_${action.replace(/[\[\] ]/g,'')}`, 5000);
            actionCount++;
          }
          
          // نهایی
          await continuousCapture(page, `end_final_result`, 5000);
          await browser.close();
          
          const totalFrames = require('child_process').execSync('ls screenshots/*.png 2>/dev/null | wc -l', {encoding: 'utf8'}).trim();
          console.log(`🎉 تمام! کل ${totalFrames} frame گرفته شد`);
        })();

        EOF
    
    - name: Run Capture
      run: |
        rm -rf screenshots/ *.png numbers.txt
        git pull origin main --force
        mkdir -p screenshots
        export DISPLAY=:99
        Xvfb :99 -screen 0 1366x768x24 -ac -noreset &
        sleep 2
        node capture.cjs
        pkill Xvfb || true
    
    - name: Stats & Commit
      run: |
        TOTAL=$(ls screenshots/*.png 2>/dev/null | wc -l)
        echo "📊 $TOTAL اسکرین‌شات گرفته شد"
        ls -la screenshots/ | head -10
        
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add screenshots/*.png || true
        
        if [ "$TOTAL" -gt 0 ]; then
          git commit -m "📸 $TOTAL frames captured $(date) [skip ci]" || true
          git push || true
          echo "✅ Push شد"
        else
          echo "⚠️ فایلی نیست"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
