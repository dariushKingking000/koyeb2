name: Stealth Type with Video Recording
on: [push]
permissions:
  contents: write

jobs:
  type:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Chrome
      uses: browser-actions/setup-chrome@v1.1.0
      
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install xvfb, ffmpeg, and unzip
      run: sudo apt-get update && sudo apt-get install -y xvfb ffmpeg --no-install-recommends

    - name: Install npm packages
      run: |
        rm -rf node_modules package*.json || true
        npm init -y
        npm i puppeteer-core@latest puppeteer-extra puppeteer-extra-plugin-stealth

    - name: Create User Data Dir
      run: mkdir -p user_data
    
    - name: Create type.js script
      run: |
        cat > type.js << EOF
const puppeteer = require('puppeteer-extra');
const StealthPlugin = require('puppeteer-extra-plugin-stealth');
puppeteer.use(StealthPlugin());
const TEXT_TO_TYPE = 'سلام! چطوری؟';
const CLICK_X = 134;
const CLICK_Y = 254;
let browser = null;
(async () => {
  try {
    const { spawn } = require('child_process');
    const xvfb = spawn('Xvfb', [':99', '-screen', '0', '1366x768x24'], { stdio: 'ignore' });
    await new Promise(r => setTimeout(r, 2000));
    const ffmpeg = spawn('ffmpeg', ['-y', '-f', 'x11grab', '-video_size', '1366x768', '-i', ':99.0+0,0', '-r', '15', '-pix_fmt', 'yuv420p', 'output.mp4']);
    await new Promise(r => setTimeout(r, 1000));
    browser = await puppeteer.launch({
      headless: false,
      userDataDir: './user_data',
      executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome',
      args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-gpu', '--disable-dev-shm-usage', '--window-size=1366,768', '--display=:99']
    });
    const page = await browser.newPage();
    await page.setViewport({width:1366, height:768});
    console.log('Loading...');
    await page.goto('https://chatgpt.com', {waitUntil: 'networkidle2'});
    await new Promise(r => setTimeout(r, 3000));
    await page.screenshot({path: '1.png'});
    console.log('Clicking...');
    await page.mouse.click(CLICK_X, CLICK_Y);
    await new Promise(r => setTimeout(r, 2000));
    await page.screenshot({path: '2.png'});
    console.log('Typing...');
    await page.keyboard.type(TEXT_TO_TYPE, {delay: 80});
    await new Promise(r => setTimeout(r, 2000));
    await page.screenshot({path: '3.png'});
    console.log('✅ Done!');
    await new Promise(r => setTimeout(r, 2000));
  } catch (e) {
    console.error('Error:', e.message);
  } finally {
    if (browser) await browser.close();
  }
})();
EOF

    - name: Run script
      run: |
        node type.js
        sleep 3
        pkill Xvfb ffmpeg || true

    - name: Prepare video
      run: |
        [ -f output.mp4 ] && mv output.mp4 video.mp4 || touch video.mp4
        echo "Files: $(ls *.png video.mp4 2>/dev/null | wc -l)"

    - name: Commit & Push
      run: |
        git config user.name github-actions[bot]
        git config user.email 41898282+github-actions[bot]@users.noreply.github.com
        git add *.png video.mp4 type.js package*.json || true
        git rm -rf user_data || true
        git commit -m "Typing $(date +%Y-%m-%d_%H:%M)" || true
        git push origin HEAD:main || true
