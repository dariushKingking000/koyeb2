name: Screenshot Generator
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}$
    
    - name: Setup & Generate
      uses: appleboy/node-action@v1.0.0
      with:
        version: 20
        script: |
          npm init -y
          npm i playwright
          npx playwright install chromium webkit
          
          $cat > test.js << 'JS_EOF'$
          $const { chromium, webkit } = require('playwright')$;
          $const fs = require('fs')$;
          
          $(async () => {$
            $let config = { url: 'https://chatgpt.com' }$;
            $if (fs.existsSync('config.json')) {$
              $config = JSON.parse(fs.readFileSync('config.json'))$;
              $console.log('Using config.json:', config.url)$;
            }
            
            // Chromium
            $const browser1 = await chromium.launch({ headless: true })$;
            $const page1 = await browser1.newPage()$;
            $await page1.goto(config.url)$;
            $await page1.waitForTimeout(3000)$;
            $await page1.screenshot({ path: 'screenshot1.png', fullPage: true })$;
            $await browser1.close()$;
            
            // Webkit
            $const browser2 = await webkit.launch({ headless: true })$;
            $const page2 = await browser2.newPage()$;
            $await page2.goto(config.url)$;
            $await page2.waitForTimeout(3000)$;
            $await page2.screenshot({ path: 'screenshot2.png', fullPage: true })$;
            $await browser2.close()$;
            
            $fs.writeFileSync('config.json', JSON.stringify(config, null, 2))$;
            $console.log('✅ Done')$;
          })();
          $JS_EOF$
          
          node test.js
    
    - name: Commit Results
      uses: stefanzweifel/git-auto-commit-action@v5
      env:
        $GITHUB_TOKEN$: {{ secrets.GITHUB_TOKEN }}
      with:
        commit_message: Add screenshots
        file_pattern: '*.png config.json'
