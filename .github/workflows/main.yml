name: Anti-Cloudflare Click
on: [push]
permissions: { contents: write }

jobs:
  click:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - name: Install & Fix
      run: |
        npm init -y
        npm i puppeteer@latest puppeteer-extra@latest puppeteer-extra-plugin-stealth@latest
        npm audit fix --force
    # بقیه steps مثل قبل...
