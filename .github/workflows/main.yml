name: Screen Record Bot
on: [workflow_dispatch]
jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install Dependencies
      run: |
        sudo apt update
        sudo apt install -y xvfb ffmpeg
        npm install
        
    - name: Create Directories
      run: mkdir -p record user_data
      
    - name: Run Recorder
      run: node record.js
      
    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: screen-record
        path: |
          ./record/*
          ./instructions.txt
