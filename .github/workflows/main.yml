name: ChatGPT Click + Auto Logs
on: [push]
permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    
    - name: FULL DEBUG + ChatGPT
      run: |
        # تمام لاگ‌ها ذخیره می‌شود
        exec > >(tee -a FULL_LOGS.txt) 2>&1
        
        echo "=== 1. Node Check ==="
        node --version || echo "Node missing"
        npm --version || echo "npm missing"
        
        echo "=== 2. Chrome Install ==="
        sudo apt-get update -qq -y
        sudo apt-get install -y wget gnupg lsb-release -qq
        
        # Chrome با روش جدید
        curl -fsSL https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update -qq
        sudo apt-get install -y google-chrome-stable -qq
        google-chrome --version
        
        echo "=== 3. Playwright ==="
        npm init -y
        npm install playwright-core@1.47.0
        
        echo "=== 4. TEST SCRIPT ==="
        cat > test.js << 'EOF'
        console.log("TEST START");
        const { chromium } = require('playwright-core');
        (async () => {
          const browser = await chromium.launch({ 
            headless: true, 
            executablePath: '/usr/bin/google-chrome-stable',
            args: ['--no-sandbox']
          });
          const page = await browser.newPage();
          await page.goto('https://httpbin.org/html');
          await page.click('h1');
          await page.screenshot({path: 'test.png'});
          await browser.close();
          console.log("TEST SUCCESS");
        })();
        EOF
        node test.js
        
        echo "=== 5. CHATGPT SCRIPT ==="
        cat > chatgpt.js << 'EOF'
        const { chromium } = require('playwright-core');
        (async () => {
          const browser = await chromium.launch({
            headless: true,
            executablePath: '/usr/bin/google-chrome-stable',
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          const page = await browser.newPage();
          await page.goto('https://chatgpt.com/', {timeout: 30000});
          await page.screenshot({path: 'chatgpt-before.png'});
          
          // اولین button قابل کلیک
          await page.waitForSelector('button', {timeout: 10000});
          await page.click('button:visible');
          
          await page.waitForTimeout(3000);
          await page.screenshot({path: 'chatgpt-after.png'});
          await browser.close();
          console.log("CHATGPT DONE ✅");
        })();
        EOF
        
        node chatgpt.js
        
    - uses: actions/upload-artifact@v5
      if: always()
      with:
        name: ALL-FILES-LOGS
        path: |
          FULL_LOGS.txt
          *.png
          package.json
          package-lock.json
