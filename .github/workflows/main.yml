name: Fix YAML
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}$
        fetch-depth: 0
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Generate Screenshots
      run: |
        npm init -y
        npm i playwright
        npx playwright install --with-deps chromium webkit
        
        cat > test.js << 'EOF'
        $const { chromium, webkit } = require('playwright')$;
        $const fs = require('fs')$;
        
        $(async () => {$
          $let config = { url: 'https://chatgpt.com' }$;
          $if (fs.existsSync('config.json')) {$
            $config = JSON.parse(fs.readFileSync('config.json'))$;
            $console.log(`📁 config$: {config.url}`);
          }
          
          // Edge screenshot
          const browserEdge = await chromium.launch({ headless: true });
          const pageEdge = await browserEdge.newPage();
          await pageEdge.goto(config.url);
          await pageEdge.waitForTimeout(3000);
          await pageEdge.screenshot({ path: 'salam-edge.png', fullPage: true });
          await browserEdge.close();
          
          // Webkit screenshot
          const browserWebkit = await webkit.launch({ headless: true });
          const pageWebkit = await browserWebkit.newPage();
          await pageWebkit.goto(config.url);
          await pageWebkit.waitForTimeout(3000);
          await pageWebkit.screenshot({ path: 'salam-webkit.png', fullPage: true });
          await browserWebkit.close();
          
          // Save config
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          
          console.log('✅ screenshots ready');
        })();
        EOF
        
        node test.js
    
    - name: Auto Commit
      uses: EndBug/add-and-commit@v9
      with:
        add: 'salam-*.png config.json'
        message: 'Add screenshots + config.json'
