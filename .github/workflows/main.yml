name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # ✅ Git push permission

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        rm -rf node_modules package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create record.cjs
      run: |
        cat > record/record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        (async () => {
          try {
            const instructions = [
              '[click 200 400]'
            ];
            console.log(`📋 ${instructions.length} instructions loaded`);
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await new Promise(r=>setTimeout(r,5000));
            console.log('🌐 ChatGPT loaded');

            const selectors = ['textarea','[contenteditable="true"]','[data-id="root"] textarea','div[contenteditable]','.ProseMirror','prompt-textarea','[role="textbox"]'];

            for(let i=0; i<instructions.length; i++){
              const cmd = instructions[i];
              console.log(`🔄 ${i+1}/9: ${cmd}`);
              
              if(cmd.startsWith('[type ')){
                let found=false;
                for(const selector of selectors){
                  try{
                    await page.waitForSelector(selector,{timeout:3000});
                    const el=await page.$(selector);
                    await el.click();
                    const text=cmd.slice(6,-1);
                    await page.keyboard.type(text,{delay:80});
                    console.log(`✅ Typed: "${text}"`);
                    found=true;
                    break;
                  }catch(e){}
                }
                if(!found) await page.keyboard.press('Enter');
              }else if(cmd.startsWith('[click ')){
                const [x,y]=cmd.slice(7,-1).split(' ').map(Number);
                await page.mouse.click(x,y);
                console.log(`🖱️ Clicked (${x},${y})`);
              }else if(cmd.startsWith('[wait ')){
                const s=parseInt(cmd.slice(6,-1));
                await new Promise(r=>setTimeout(r,s*1000));
                console.log(`⏳ Waited ${s}s`);
              }
            }
            
            console.log('🎬 Closing...');
            await new Promise(r=>setTimeout(r,5000));
            await browser.close();
            console.log('✅ Complete!');
          }catch(e){
            console.error('❌',e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Record Screen
      run: |
        rm -f record/*.mp4
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 3
        
        timeout 180s ffmpeg -f x11grab -s 1366x768 -r 25 -i :99.0 \
          -t 180 -c:v libx264 -pix_fmt y4m10le -crf 23 -preset fast \
          ./record/demo_full.mp4 &
        
        FFMPEG_PID=$!
        sleep 3
        node record/record.cjs
        sleep 8
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        
        ls -la record/
        du -sh record/*
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 🎥-Screen-Recording
        path: record/
        retention-days: 30
    
    - name: Commit Results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add record/ || true
        if ! git diff --staged --quiet; then
          git commit -m "🎥 Update screen recording [skip ci]"
          git push || echo "Push failed - check repo settings"
        else
          echo "No changes to commit"
        fi
