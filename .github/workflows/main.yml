name: Pure Clicks (No Git Push)
on: [push]
permissions:
  contents: read

jobs:
  clicks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Pure Clicks Only
      run: |
        npm init -y &>/dev/null
        npm i playwright canvas &>/dev/null
        npx playwright install chromium &>/dev/null
        
        cat > clicks.js << 'EOF'
        const { chromium } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        const CLICK_X = 134;
        const CLICK_Y = 165;
        const RADIUS = 1;
        
        let state = { url: 'https://google.com', clicks: [] };
        
        if (fs.existsSync('click-state.json')) {
          state = JSON.parse(fs.readFileSync('click-state.json'));
        }
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          
          await page.goto(state.url);
          
          // کلیک
          await page.mouse.click(CLICK_X, CLICK_Y);
          state.clicks.push({x: CLICK_X, y: CLICK_Y, time: new Date().toISOString()});
          await page.waitForTimeout(2000);
          
          await page.waitForTimeout(10000);
          
          await page.screenshot({path: 'current.png'});
          
          const img = await loadImage('current.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0);
          
          state.clicks.slice(-15).forEach((click, i) => {
            ctx.beginPath();
            ctx.arc(click.x, click.y, RADIUS, 0, 2 * Math.PI);
            ctx.fillStyle = `rgba(255,0,0,${0.9-i*0.05})`$;
            $ctx.fill()$;
            $ctx.strokeStyle = '#ff0000'$;
            $ctx.lineWidth = 2$;
            $ctx.stroke()$;
          });
          
          $fs.writeFileSync('clicks-only.png', canvas.toBuffer('image/png'))$;
          
          $state.url = page.url()$;
          $state.clicksCount = state.clicks.length$;
          $state.lastUpdate = new Date().toISOString()$;
          
          $fs.writeFileSync('click-state.json', JSON.stringify(state, null, 2))$;
          $await browser.close()$;
          
          $console.log(`✅$ {state.clicksCount} clicks`);
        })();
        EOF
        
        node clicks.js
    
    - uses: actions/upload-artifact@v4
      with:
        name: clicks-output
        path: |
          clicks-only.png
          click-state.json
        retention-days: 7
