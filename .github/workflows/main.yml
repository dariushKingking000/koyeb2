- name: Recorder Script
      run: |
        cat > record.js << 'EOF'
        const puppeteer = require('**puppeteer-extra**');  // 👈 درست شد!
        const StealthPlugin = require('puppeteer-extra-plugin-stealth');
        puppeteer.use(StealthPlugin());
        const fs = require('fs');
        const { spawn } = require('child_process');
        
        const TEXT_TO_TYPE = 'سلام! چطوری؟';
        const CLICK_X = 134;
        const CLICK_Y = 254;
        
        (async () => {
          try {
            // Xvfb آماده
            const browser = await puppeteer.launch({
              headless: **false**,
              userDataDir: './user_data',
              executablePath: '/opt/hostedtoolcache/chromium/latest/x64/chrome',
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--window-size=1366,768',
                '--disable-gpu'
              ]
            });
            
            const page = await browser.newPage();
            await page.setViewport({width:1366, height:768});
            
            // ضبط 25 ثانیه
            const ffmpeg = require('ffmpeg-static');
            const recordProc = spawn(ffmpeg, [
              '-f', 'x11grab',
              '-s', '1366x768',
              '-r', '25',
              '-i', ':99.0',
              '-t', '25',
              '-c:v', 'libx264',
              '-pix_fmt', 'yuv420p',
              './record/demo.mp4'
            ]);
            
            console.log('🎥 ضبط شروع...');
            
            await page.goto('https://chatgpt.com', {timeout: 60000});
            await page.waitForTimeout(3000);
            
            await page.screenshot({path: 'step1_chatgpt.png'});
            
            // کلیک
            await page.mouse.click(CLICK_X, CLICK_Y);
            await page.waitForTimeout(2000);
            await page.screenshot({path: 'step2_click.png'});
            
            // تایپ
            await page.keyboard.type(TEXT_TO_TYPE, {delay: 80});
            await page.waitForTimeout(3000);
            await page.screenshot({path: 'step3_type.png'});
            
            // پایان
            recordProc.kill();
            await page.waitForTimeout(2000);
            await browser.close();
            
            console.log('✅ ویدیو: record/demo.mp4');
          } catch (e) {
            console.error('❌ خطا:', e.message);
          }
        })();
        EOF
