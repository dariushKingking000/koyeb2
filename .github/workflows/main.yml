name: Fix YAML
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i playwright && npx playwright install chromium
    
    - name: Screenshot
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          await page.goto('https://google.com');
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          await page.waitForTimeout(3000);
          await page.screenshot({path: 'salam.png', fullPage: true});
          await browser.close();
          console.log('✅ سلام.png');
        })().catch(console.error);
        EOF
        
        node test.js
        
        ls -la *.png
    
    - name: Commit
      run: |
        git config user.name "Actions"
        git config user.email "actions@github.com"
        git add salam.png
        git commit -m "Add salam.png" || exit 0
        git push
