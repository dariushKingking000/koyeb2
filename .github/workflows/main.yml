name: Fix YAML
on: [push]
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}$
        fetch-depth: 0
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm init -y && npm i playwright
    
    - name: Screenshot & Save URL
      run: |
        cat > test.js << 'EOF'
        $const { chromium, webkit } = require('playwright')$;
        $const fs = require('fs')$;
        
        $(async () => {$
          $let config = { url: 'https://chatgpt.com' }$;
          $if (fs.existsSync('config.json')) {$
            $config = JSON.parse(fs.readFileSync('config.json', 'utf8'))$;
            $console.log(`📁$ از config.json: {config.url}`);
          }
          
          // Edge
          const browserEdge = await chromium.launch({channel: 'msedge', headless: true});
          const pageEdge = await browserEdge.newPage();
          await pageEdge.goto(config.url);
          await pageEdge.waitForTimeout(2000);
          await pageEdge.screenshot({path: 'salam-edge.png', fullPage: true});
          await browserEdge.close();
          
          // Webkit
          const browserIE = await webkit.launch({headless: true});
          const pageIE = await browserIE.newPage();
          await pageIE.goto(config.url);
          await pageIE.waitForTimeout(2000);
          await pageIE.screenshot({path: 'salam-ie.png', fullPage: true});
          await browserIE.close();
          
          // ذخیره URL
          config.url = 'https://chatgpt.com';
          fs.writeFileSync('config.json', JSON.stringify(config, null, 2));
          
          console.log('✅ salam-edge.png & salam-ie.png');
        })().catch(console.error);
        EOF
        
        timeout 90s node test.js
        
        cat config.json || echo "config.json ایجاد شد"
        ls -la *.png *.json || true
    
    - name: Commit
      run: |
        git config --global user.name "Actions"
        git config --global user.email "actions@github.com"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git add salam-*.png config.json || true
        git diff --staged --quiet || git commit -m "Add screenshots + config.json"
        git push || exit 0
