name: 📸 Screen Capture Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg
        
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install packages
      run: |
        mkdir -p screenshots
        rm -rf node_modules package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create empty pass.txt
      run: echo "" > pass.txt
    
    - name: Create capture.cjs
      run: |
        cat > capture.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs');
        
        (async () => {
          try {
            const instructions = [
              '[click 564 264]',
              '[type  kingking@gmail.com]',
              '[wait 5]',
              '[click 640 330]',
              '[wait 10]',
              '[type pass.txt]',
              '[click 583 492]'
            ];
            
            const browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://app.n8n.cloud/register', { waitUntil: 'networkidle0' });
            await new Promise(r=>setTimeout(r,3000));

            const selectors = [
              'textarea', '[contenteditable="true"]', '[data-id="root"] textarea',
              'div[contenteditable]', '.ProseMirror', 'prompt-textarea', '[role="textbox"]',
              'input[type="text"]', 'input[type="email"]', '#email', '#username'
            ];

            let frame = 0;
            
            await page.screenshot({ path: `screenshots/frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
            console.log(`📸 Frame ${frame}: Initial load`);
            frame++;

            for(let i=0; i<instructions.length; i++){
              const cmd = instructions[i];
              console.log(`🔄 ${i+1}/${instructions.length}: ${cmd}`);
              
              await page.screenshot({ path: `screenshots/frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
              console.log(`📸 Frame ${frame}: Before ${cmd}`);
              frame++;
              
              if(cmd.startsWith('[type ')){
                const text = cmd.slice(6, -1).trim();
                
                if(text === 'pass.txt'){
                  console.log('🔐 Checking pass.txt for 6 digits...');
                  
                  let passContent = '';
                  let attempts = 0;
                  
                  // هر 1 دقیقه تا 6 رقم پیدا بشه
                  while(true){
                    try {
                      passContent = fs.readFileSync('pass.txt', 'utf8').trim();
                      console.log(`📄 pass.txt: "${passContent}" (length: ${passContent.length})`);
                      
                      // اگر دقیقاً 6 رقم باشه → تایپ کن
                      if(passContent.length === 6 && /^\d{6}$/.test(passContent)){
                        console.log(`✅ 6 digits found: ${passContent}`);
                        break;
                      }
                    }catch(e){
                      console.log('⚠️ pass.txt empty or error');
                    }
                    
                    // 1 دقیقه صبر + نمایش attempt
                    attempts++;
                    console.log(`⏳ Wait 1min... (attempt ${attempts})`);
                    await new Promise(r=>setTimeout(r, 60000));
                  }
                  
                  // حالا تایپ کن
                  let found = false;
                  for(const selector of selectors){
                    try{
                      await page.waitForSelector(selector, {timeout: 3000});
                      const el = await page.$(selector);
                      if(el){
                        await el.click({force: true});
                        await page.waitForTimeout(500);
                        await page.keyboard.type(passContent, {delay: 150});
                        console.log(`✅ Typed: ${passContent}`);
                        found = true;
                        break;
                      }
                    }catch(e){}
                  }
                  if(!found){
                    await page.keyboard.type(passContent, {delay: 150});
                  }
                  
                }else{
                  // type عادی
                  let found = false;
                  for(const selector of selectors){
                    try{
                      await page.waitForSelector(selector, {timeout: 3000});
                      const el = await page.$(selector);
                      if(el){
                        await el.click({force: true});
                        await page.waitForTimeout(500);
                        await page.keyboard.type(text, {delay: 150});
                        found = true;
                        break;
                      }
                    }catch(e){}
                  }
                  if(!found) await page.keyboard.type(text, {delay: 150});
                }
                
              }else if(cmd.startsWith('[click ')){
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                await page.mouse.click(x, y);
                
              }else if(cmd.startsWith('[wait ')){
                const s = parseInt(cmd.slice(6, -1));
                await new Promise(r=>setTimeout(r, s*1000));
              }
              
              await page.screenshot({ path: `screenshots/frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
              console.log(`📸 Frame ${frame}: After ${cmd}`);
              frame++;
            }
            
            await new Promise(r=>setTimeout(r, 3000));
            await page.screenshot({ path: `screenshots/frame_${frame.toString().padStart(4,'0')}.png`, fullPage: false });
            console.log(`✅ Total: ${frame} frames!`);
            
            await browser.close();
          }catch(e){
            console.error('❌ Error:', e.message);
            process.exit(1);
          }
        })();
        JS_EOF
    
    - name: Capture Screenshots
      run: |
        rm -rf screenshots/*.png
        Xvfb :99 -screen 0 1366x768x24 -ac &
        export DISPLAY=:99
        sleep 3
        node capture.cjs
        pkill Xvfb || true
        echo "📄 Final pass.txt:"
        cat pass.txt
        echo "📊 Frames: $(ls screenshots/*.png 2>/dev/null | wc -l)"
    
    - name: Create ZIP
      run: zip -r screenshots.zip screenshots/ pass.txt
    
    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 📸-n8n-register-screenshots
        path: |
          screenshots.zip
          screenshots/
          pass.txt
        retention-days: 30
