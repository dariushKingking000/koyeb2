name: Chrome Automation
on: [push]
permissions:
  contents: write

jobs:
  chrome:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Chrome + Small Red Circle + 10s Wait
      run: |
        npm init -y &>/dev/null
        npm i playwright canvas &>/dev/null
        npx playwright install chromium &>/dev/null
        
        cat > final-screenshot.js << 'EOF'
        const { chromium } = require('playwright');
        const { createCanvas, loadImage } = require('canvas');
        const fs = require('fs');
        
        const CLICK_X = 134;
        const CLICK_Y = 165;
        const RADIUS = 1; // دایره کوچکتر
        
        (async () => {
          const browser = await chromium.launch({headless: true});
          const page = await browser.newPage();
          
          await page.goto('https://google.com');
          await page.fill('textarea[name="q"]', 'سلام');
          await page.press('textarea[name="q"]', 'Enter');
          await page.waitForTimeout(3000);
          
          // کلیک
          await page.mouse.click(CLICK_X, CLICK_Y);
          await page.waitForTimeout(3000);
          
          // صبر 10 ثانیه برای تغییرات
          console.log('⏳ صبر 10 ثانیه...');
          await page.waitForTimeout(10000);
          
          // screenshot نهایی
          await page.screenshot({path: 'final.png', fullPage: true});
          
          // دایره قرمز کوچیک
          const img = await loadImage('final.png');
          const canvas = createCanvas(img.width, img.height);
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(img, 0, 0);
          ctx.beginPath();
          ctx.arc(CLICK_X, CLICK_Y, RADIUS, 0, 2 * Math.PI);
          ctx.fillStyle = 'rgba(255,0,0,0.6)';
          ctx.fill();
          ctx.strokeStyle = '#ff0000';
          ctx.lineWidth = 3;
          ctx.stroke();
          
          fs.writeFileSync('chrome-final.png', canvas.toBuffer('image/png'));
          
          fs.writeFileSync('chrome-state.json', JSON.stringify({
            click: [CLICK_X, CLICK_Y],
            wait: '10s',
            title: await page.title(),
            url: page.url(),
            time: new Date().toISOString()
          }, null, 2));
          
          await browser.close();
        })().catch(console.error);
        EOF
        
        node final-screenshot.js
    
    - uses: actions/upload-artifact@v4
      with:
        name: chrome-10s-final
        path: |
          chrome-final.png
          chrome-state.json
    
    - name: Commit
      if: always()
      run: |
        git config --global user.name "Actions"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add chrome-final.png chrome-state.json || true
        git commit -m "Final screenshot after 10s + small red circle" || true
        git push || true
