name: Test & Save Results Locally
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Playwright
      run: npm install --save-dev @playwright/test@latest && npx playwright install --with-deps
    
    - name: Google Test + Save Results
      run: |
        cat > test.js << 'EOF'
        const { chromium } = require('playwright');
        (async () => {
          const browser = await chromium.launch();
          const page = await browser.newPage();
          await page.goto('https://google.com');
          console.log('صفحه: google.com');
          
          await page.fill('textarea[name="q"]', 'سلام');
          console.log('سلام تایپ شد');
          
          const title = await page.title();
          console.log('عنوان:', title);
          
          await browser.close();
          console.log('✅ تست تمام!');
        })();
        EOF
        
        node test.js > test-results.txt 2>&1
        
    - name: Show & Commit Results
      run: |
        cat test-results.txt
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add test-results.txt
        git commit -m "Add test results" || echo "No changes"
        git push
