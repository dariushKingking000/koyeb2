name: 🎥 Screen Record Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install deps
      run: |
        sudo apt update -y
        sudo apt install -y xvfb ffmpeg -y
        
    - name: Setup Node & Puppeteer
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
    
    - name: Install packages
      run: |
        rm -f package*.json
        npm init -y
        npm install puppeteer@latest
        echo '{"type": "commonjs"}' > package.json
    
    - name: Create record.cjs
      run: |
        cat > record.cjs << 'JS_EOF'
        const puppeteer = require('puppeteer');
        const fs = require('fs/promises');

        (async () => {
          let browser = null;
          let page = null;
          const TIMEOUT_MS = 20000;
          
          try {
            const data = await fs.readFile('./instructions.txt', 'utf8');
            const instructions = data.split('\n')
              .map(l => l.trim())
              .filter(l => l && l.startsWith('[') && l.endsWith(']'));
            
            console.log(`📋 ${instructions.length} دستور`);
            
            browser = await puppeteer.launch({
              headless: false,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-gpu']
            });
            
            page = await browser.newPage();
            await page.setViewport({ width: 1366, height: 768 });
            await page.goto('https://chatgpt.com', { waitUntil: 'networkidle0' });
            await new Promise(r => setTimeout(r, 3000));
            console.log('🌐 ChatGPT آماده');
            
            const selectors = [
              'div[contenteditable]', 'textarea', '[contenteditable="true"]', 
              '[data-id="root"] textarea', '.ProseMirror', '[role="textbox"]'
            ];

            for (let i = 0; i < instructions.length; i++) {
              const cmd = instructions[i];
              console.log(`#${i+1}/${instructions.length}: ${cmd}`);
              const cmdStart = Date.now();
              
              if (!page || page.isClosed?.()) {
                console.log('⚠️ Page بسته → STOP');
                break;
              }
              
              let timeoutId = null;
              
              if (cmd.startsWith('[type ')) {
                console.log('⌨️ تایپ شروع (20s timeout)...');
                const text = cmd.slice(6, -1);
                let success = false;
                
                timeoutId = setTimeout(async () => {
                  if (!success) {
                    console.log('⏰ 20s تایپ تمام → بعدی!');
                    await new Promise(r => setTimeout(r, 500));
                  }
                }, TIMEOUT_MS);
                
                try {
                  const input = await page.waitForSelector(selectors.join(','), { timeout: 3000 });
                  await input.click({ timeout: 2000 });
                  await page.keyboard.type(text, { delay: 30 });
                  await page.keyboard.press('Enter');
                  console.log(`✅ "${text}" selector OK`);
                  success = true;
                } catch(e1) {
                  try {
                    await page.keyboard.type(text.slice(0, 50), { delay: 30 });
                    await page.keyboard.press('Enter');
                    console.log(`✅ "${text}" مستقیم OK`);
                    success = true;
                  } catch(e2) {
                    console.log('⚠️ تایپ fail');
                  }
                }
                
                clearTimeout(timeoutId);
                if (success) {
                  console.log('✅ تایپ تمام → 1s pause');
                  await new Promise(r => setTimeout(r, 1000));
                } else {
                  await new Promise(r => setTimeout(r, 500));
                }
                
              } else if (cmd.startsWith('[click ')) {
                console.log('🖱️ کلیک شروع (20s timeout)...');
                const [x, y] = cmd.slice(7, -1).split(' ').map(Number);
                
                timeoutId = setTimeout(async () => {
                  console.log('⏰ 20s کلیک تمام → بعدی!');
                  await new Promise(r => setTimeout(r, 500));
                }, TIMEOUT_MS);
                
                try {
                  await page.mouse.click(x, y, { timeout: 5000 });
                  console.log(`✅ کلیک (${x},${y}) OK`);
                  await new Promise(r => setTimeout(r, 800)); // 0.8s بعد کلیک
                } catch(e) {
                  console.log('⚠️ کلیک fail');
                }
                
                clearTimeout(timeoutId);
                
              } else if (cmd.startsWith('[wait ')) {
                const s = parseInt(cmd.slice(6, -1));
                console.log(`⏳ ${s} ثانیه`);
                await new Promise(r => setTimeout(r, s * 1000));
              }
              
              const elapsed = Math.round((Date.now() - cmdStart) / 1000);
              console.log(`⏱️ ${elapsed}s برای #${i+1} → بعدی`);
            }
            
            console.log('🏁 3s نهایی...');
            await new Promise(r => setTimeout(r, 3000));
            
          } catch(e) {
            console.log('❌ خطا:', e.message);
          } finally {
            console.log('🔒 Cleanup...');
            try { if (page) await page.close(); } catch(e) {}
            try { if (browser) await browser.close(); } catch(e) {}
            console.log('✅ تمام');
          }
        })();
        JS_EOF
    
    - name: Record & Commit to Repo
      run: |
        Xvfb :99 -screen 0 1366x768x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        sleep 3
        
        ffmpeg -loglevel error -f x11grab -draw_mouse 1 \
          -s 1366x768 -r 30 -i :99 \
          -t 180 -c:v libx264 -crf 18 -preset medium \
          -pix_fmt yuv420p screen-record.mp4 &
        
        FFMPEG_PID=$!
        sleep 2
        
        node record.cjs
        
        sleep 3
        kill $FFMPEG_PID 2>/dev/null || true
        pkill -f ffmpeg || true
        pkill -f Xvfb || true
        
        git config --global user.name "Auto Record Bot"
        git config --global user.email "bot@github.com"
        git add screen-record.mp4 instructions.txt record.cjs
        git commit -m "🎥 Record $(date '+%Y-%m-%d %H:%M') | $(du -h screen-record.mp4 | cut -f1)" || true
        git push
        
        echo "✅ در repo:"
        ls -la screen-record.mp4
        du -sh screen-record.mp4
